<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Age of Guthology</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
:root{
  --bg:#080b12; --panel:#101722; --panel2:#151e2b; --line:#304155;
  --text:#eef3f8; --muted:#9cadbd; --gold:#e7c979; --gold2:#a87b2d;
  --red:#d86363; --blue:#5ea8ff; --green:#7bd38d; --mana:#8fd0ff;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0; color:var(--text); font-family:Segoe UI,Arial,sans-serif;
  background:
    radial-gradient(circle at 50% -10%,rgba(169,128,65,.25),transparent 36%),
    radial-gradient(circle at 0 30%,rgba(91,76,164,.18),transparent 32%),
    linear-gradient(180deg,#05070d,#0a0f18 45%,#05070d);
}
button,select,input{font:inherit}
button{border:1px solid #466078; background:#101b2a; color:#f6efe0; border-radius:8px; padding:8px 12px; cursor:pointer; font-weight:700}
button:hover{border-color:var(--gold); color:#fff}
button:disabled{opacity:.45; cursor:not-allowed}
select,input{background:#08111d; color:var(--text); border:1px solid var(--line); border-radius:7px; padding:8px; width:100%; min-width:0}

/* ===== Setup ===== */
.setup{max-width:1000px; margin:20px auto; padding:0 14px}
.setup h1{font-family:Georgia,serif; font-size:clamp(30px,6vw,46px); margin:0 0 6px; color:var(--gold); letter-spacing:3px}
.setup p{color:var(--muted); margin:0 0 16px}
.setup-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px}
@media(max-width:820px){ .setup-grid{grid-template-columns:1fr} }
.setup-card,.rules-card{border:1px solid var(--line); background:rgba(16,23,34,.86); border-radius:10px; padding:14px}
.setup-card h2,.rules-card h2{margin:0 0 10px; color:#fff; font-size:19px}
.myth-row{display:grid; grid-template-columns:92px 1fr; gap:10px; align-items:center; margin:10px 0}
.myth-portrait{width:92px; height:92px; border-radius:8px; border:1px solid #46576c; background:#172030 center/cover no-repeat}
.myth-fields{display:grid; gap:6px}
.myth-fields label{display:grid; gap:3px; color:#cbd8e5; font-size:13px}
.kit-preview{font-size:11px; color:#cbd8e5; border:1px dashed #40546a; border-radius:8px; padding:7px; margin-top:6px; line-height:1.4}
.kit-preview b{color:var(--gold)}
.rules-card ul{margin:8px 0 0; padding-left:18px; color:#cdd8e5; line-height:1.5; font-size:14px}
.online-row{display:grid; grid-template-columns:1fr auto; gap:8px; margin-top:10px}
#statusLobby{margin-top:10px; color:#cbd8e5; min-height:20px; line-height:1.4}
#statusLobby .codigo{display:block; margin:6px 0; color:var(--gold); font-size:30px; letter-spacing:8px; font-weight:900}
.small-note{color:var(--muted); font-size:12px; margin-top:8px}
.phase-controls{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}

/* ===== Mesa ===== */
.table{max-width:1240px; margin:0 auto; padding:6px 8px 14px; display:flex; flex-direction:column; gap:8px; min-height:100vh}
.topbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.brand{font-family:Georgia,serif; color:var(--gold); letter-spacing:2px; font-size:18px; font-weight:800}
.pill{border:1px solid var(--line); background:#0b1320; border-radius:999px; padding:4px 10px; color:var(--muted); font-size:13px; white-space:nowrap}
.pill b{color:var(--text)}
.pill.ok b{color:var(--green)}
.grow{flex:1}

.pzone{display:flex; flex-direction:column; gap:6px}
.pstrip{display:flex; align-items:center; gap:10px; flex-wrap:wrap; border:1px solid var(--line); border-radius:10px; background:rgba(16,23,34,.88); padding:8px 10px}
.pstrip.done{border-color:var(--green)}
.pstrip .avatar{width:46px; height:46px; border-radius:8px; border:1px solid #46576c; background:#1a2432 center/cover no-repeat; flex:0 0 auto}
.pstrip .pname{font-weight:900; font-size:15px}
.pstrip .god{color:var(--muted); font-size:12px}
.stat{padding:3px 8px; border:1px solid var(--line); border-radius:999px; font-size:13px; background:#07101c; white-space:nowrap}
.stat.mana{color:var(--mana)}
.stat.win{color:#ffe3a0; border-color:#8a6e35}
.acts{display:flex; gap:6px; flex-wrap:wrap; margin-left:auto}
.acts button{font-size:12px; padding:6px 9px}

/* Painel do deus: passiva + ativa SEMPRE visiveis */
.god-panel{
  border:1px solid #5d4c2d; border-radius:10px; background:rgba(30,24,12,.5); padding:7px 10px;
  font-size:12px; color:#e6dcc3; line-height:1.4; display:grid; gap:3px;
}
.god-panel .gp-row b{color:var(--gold)}
@media(max-width:640px){ .god-panel{font-size:11px} }

/* Mao horizontal */
.hand-row{display:flex; gap:8px; overflow-x:auto; padding:10px 4px 6px; min-height:132px; align-items:stretch}
.hand-row.oculta{min-height:60px; align-items:center}
.hcard{
  flex:0 0 110px; min-height:120px; border:1px solid #45586f; border-radius:9px; padding:7px;
  background:linear-gradient(180deg,#1b2533,#0d131d); position:relative; cursor:pointer;
  display:flex; flex-direction:column; gap:3px; transition:transform .1s;
}
.hcard:hover{transform:translateY(-3px)}
.hcard.unit{border-color:#526b8d}
.hcard.spell{border-color:#695490}
.hcard.dead{opacity:.45; cursor:not-allowed}
.hcard.dead:hover{transform:none}
.hcard.selected{border-color:var(--gold); box-shadow:0 0 0 2px rgba(231,201,121,.55); transform:translateY(-4px)}
.hcard.has-art{flex-basis:132px; min-height:178px}
.hcard .card-art{height:64px; margin:0 -2px 2px; border-radius:7px; border:1px solid rgba(255,255,255,.12); background:#101722 center/cover no-repeat; box-shadow:inset 0 -18px 22px rgba(0,0,0,.28)}
.hcard .cost{position:absolute; top:-7px; left:-7px; width:24px; height:24px; border-radius:50%; background:#08111d; border:1px solid var(--gold2); display:flex; align-items:center; justify-content:center; color:var(--gold); font-weight:900; font-size:13px}
.hcard h4{margin:4px 0 0 14px; font-size:12px; line-height:1.1; min-height:24px}
.hcard .pow{font-size:19px; font-weight:900; color:#cfe3ff; text-align:center}
.hcard .pow span{font-size:10px; color:var(--muted); font-weight:400}
.hcard .fx{font-size:9.5px; color:#c9d5df; line-height:1.25; overflow:hidden}
.cardback{flex:0 0 40px; height:56px; border-radius:6px; border:1px solid #46576c; background:repeating-linear-gradient(135deg,#152033,#152033 4px,#0d1524 4px,#0d1524 8px)}
.hidden-note{color:var(--muted); font-size:12px; padding:6px 8px; border:1px dashed #40546a; border-radius:8px}

/* Board */
.board{display:grid; grid-template-areas:'L C R'; grid-template-columns:1fr 1fr 1fr; gap:10px; align-items:stretch; flex:1}
@media(max-width:880px){ .board{grid-template-areas:'L R' 'C C'; grid-template-columns:1fr 1fr} }
.slot{display:flex; flex-direction:column; gap:6px; min-height:290px}
.slot-L{grid-area:L}.slot-C{grid-area:C}.slot-R{grid-area:R}
.lane{flex:1; border:1px solid var(--line); border-radius:9px; background:rgba(10,16,26,.7); padding:6px; display:flex; flex-direction:column; gap:5px; min-height:84px}
.lane-head{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; display:flex; justify-content:space-between}
.lane-pow{font-weight:900; color:#cfe3ff}
.uchip{border:1px solid #36495e; border-radius:7px; background:#0b1320; padding:5px 7px; display:flex; align-items:center; gap:7px; font-size:12px}
.uchip .upow{font-weight:900; font-size:14px; color:#cfe3ff; min-width:20px; text-align:center}
.uchip .uname{flex:1; line-height:1.15}
.uchip .ufx{font-size:9px; color:var(--muted)}
.uchip.staged{border-style:dashed; border-color:#6d86a5; opacity:.85}
.uchip.facedown{justify-content:center; color:var(--muted); border-style:dashed; letter-spacing:2px}
.uchip.targetable{border-color:var(--gold); cursor:pointer; box-shadow:0 0 0 1px rgba(231,201,121,.5)}
.uchip.targetable:hover{filter:brightness(1.2)}
.lane-empty{color:#41546a; font-size:11px; text-align:center; padding:8px 0}
.loccard{border:1px solid #8a6e35; border-radius:9px; padding:8px; text-align:center; background:radial-gradient(circle at 50% 15%,rgba(255,216,126,.22),transparent 55%),linear-gradient(180deg,#241d10,#141a24)}
.loccard .licon{font-size:24px; line-height:1.1}
.loccard .lname{font-weight:900; color:var(--gold); font-family:Georgia,serif; margin:2px 0; font-size:14px}
.loccard .lfx{font-size:11px; color:#d8c9a3; line-height:1.3; min-height:26px}
.loccard .lscore{margin-top:4px; font-size:13px; font-weight:900; color:#cfe3ff}
.loccard.placeable{border-color:var(--gold); cursor:pointer; box-shadow:0 0 0 2px rgba(231,201,121,.5),0 0 22px rgba(231,201,121,.2)}
.loccard.placeable:hover{filter:brightness(1.18)}
.loccard.resolved{opacity:.9; border-style:dashed}
.win-banner{margin-top:5px; font-size:12px; font-weight:900; color:#ffe6a6; border:1px solid rgba(231,201,121,.6); border-radius:7px; padding:4px 6px; background:rgba(104,76,22,.3)}
.slot.resolved-slot .lane{opacity:.55}
.statuscard{border:1px dashed #40546a; border-radius:9px; padding:12px; text-align:center; color:#cbd8e5; background:rgba(8,17,29,.6); margin:auto 0; font-size:13px; line-height:1.6}
.statuscard b{color:var(--gold)}

/* Barra de dica de alvo */
.hintbar{
  border:1px solid var(--gold2); border-radius:9px; background:rgba(104,76,22,.25); color:#ffe6a6;
  padding:8px 12px; font-size:13px; font-weight:700; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.hintbar button{font-size:12px; padding:5px 8px}

.logwrap{border:1px solid var(--line); border-radius:10px; background:rgba(6,10,16,.88)}
.logwrap summary{padding:8px 12px; cursor:pointer; color:var(--gold); font-weight:700; font-size:13px}
.log{max-height:150px; overflow:auto; padding:0 12px 10px; color:#cbd8e5; font-size:12px; line-height:1.4}
.log div{border-bottom:1px solid rgba(255,255,255,.06); padding:4px 0}

.overlay{position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.78); display:flex; align-items:center; justify-content:center; padding:20px}
.overlay-card{max-width:460px; width:100%; border:1px solid var(--gold2); background:#111926; border-radius:12px; padding:22px; text-align:center}
.overlay-card h2{font-family:Georgia,serif; color:var(--gold); font-size:28px; margin:0 0 10px}
.overlay-card p{color:#cbd8e5; line-height:1.5}
</style>
</head>
<body>
<div id="app"></div>
<script>
const $ = s => document.querySelector(s);

/* ==================== DEUSES (starter kits) ==================== */

function deckDoDeus(deus){
  return Object.keys(CARDS).filter(id=>CARDS[id].deus===deus);
}

/* ==================== LOCAIS ==================== */
const LOCATIONS = {
  arena:{nome:'Arena de Ares', icon:'⚔', fx:'Unidades aqui ganham +1 de poder.'},
  templo:{nome:'Templo de Atena', icon:'🦉', fx:'O lado com MENOS unidades aqui ganha +2 em cada uma.'},
  delfos:{nome:'Oraculo de Delfos', icon:'✦', fx:'Ao revelar uma unidade aqui, compre 1 carta.'},
  porto:{nome:'Porto de Poseidon', icon:'≈', fx:'Unidades de custo 3 ou menos aqui ganham +1.'},
  necropole:{nome:'Necropole de Anubis', icon:'☥', fx:'Unidades aqui perdem 1 de poder.'},
  olimpo:{nome:'Monte Olimpo', icon:'▲', fx:'Jogar unidades aqui custa +1 de mana.'},
  forja:{nome:'Forja dos Ciclopes', icon:'◆', fx:'Unidades reveladas aqui ganham +1 permanente.'},
  labirinto:{nome:'Labirinto de Creta', icon:'◇', fx:'Efeitos "ao revelar" nao ativam aqui.'}
};
const LOCATION_IDS = Object.keys(LOCATIONS);
const TURNO_RESOLVE = 3, TURNO_FINAL = 6, CAP_LOCAL = 4;

/* ==================== ESTADO ==================== */
let state = null;
let uidSeq = 1;
let mode = 'local';
let myIndex = null;
let peer = null, conn = null, conns = [];
let lobbyStatus = '';
// selecao local de alvo (nao sincroniza)
let sel = null; // {tipo:'carta'|'ativa', idx?, precisa:[...], alvoUid?, passo}

function online(){ return mode==='host' || mode==='guest'; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function cleanNick(v,f){ const n=String(v||'').replace(/[<>&"']/g,'').trim().slice(0,18); return n||f; }
function nickIsGuto(v){ return String(v||'').trim().toLowerCase()==='guto'; }
function log(m){ state.log.unshift(m); state.log = state.log.slice(0,200); }
function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function novoPlayer(nome, deus){
  const p = { nome, deus, mana:0, deck:shuffle(deckDoDeus(deus)), mao:[], descarte:[],
    unidades:[], staging:[], ativaUsada:false,
    carry:0, renda:0, gasto:0, sobraAnterior:0, primeiroLocal:null, jogouMagia:false,
    ultimaUnid:null, proxCusto:0, jogadasLocal:{} };
  draw(p,3);
  return p;
}
function draw(p,n=1){ for(let k=0;k<n;k++) if(p.deck.length) p.mao.push(p.deck.pop()); }

function criarEstado(d1, d2, n1, n2, hideHands){
  uidSeq = 1;
  const locDeck = shuffle(LOCATION_IDS.slice());
  return {
    turno:0, ordem:0, jogadas:{0:false,1:false}, vezLocal:0,
    locais:[locDeck.shift(), locDeck.shift(), null], locDeck,
    resolvidos:[null,null,null], pend:[[],[],[]], lockAte:[0,0,0],
    movidasJogo:0, moveuNoTurno:false,
    players:[novoPlayer(n1,d1), novoPlayer(n2,d2)],
    log:[], gameOver:null, passPending:false, hideHands:!!hideHands
  };
}

function iniciarJogo(){
  fecharRede();
  mode = 'local'; myIndex = null;
  state = criarEstado(
    $('#p1Mythic').value, $('#p2Mythic').value,
    cleanNick($('#p1Name').value,'Jogador 1'), cleanNick($('#p2Name').value,'Jogador 2'),
    $('#hideHands').value==='sim'
  );
  log('Partida iniciada! Jogadas simultaneas: os dois jogam em segredo e revelam juntos.');
  iniciarTurno(1);
  render();
}

/* ==================== TURNOS ==================== */
function iniciarTurno(n){
  state.turno = n;
  state.ordem = (n%2===1) ? 0 : 1; // quem revela primeiro
  state.jogadas = {0:false,1:false};
  state.vezLocal = state.ordem;
  state.moveuNoTurno = false;
  // O Estagio Final revela no INICIO do turno 3 (ritmo Snap): efeitos de
  // "3o local" ficam vivos e da para semear cedo o campo decisivo — mas os
  // locais 1 e 2 ainda resolvem no fim do turno 3 (2x0 encerra na hora).
  if(n===TURNO_RESOLVE && !state.locais[2]){
    state.locais[2] = state.locDeck.shift();
    log('⚡ O ESTAGIO FINAL surge: '+LOCATIONS[state.locais[2]].nome+'! Ja aceita cartas — e sera o unico campo nos turnos 4 a '+TURNO_FINAL+'.');
  }
  for(const [pi,p] of state.players.entries()){
    p.carry = p.mana;
    p.mana += n;
    p.renda = n;
    p.gasto = 0;
    p.primeiroLocal = null;
    p.jogouMagia = false;
    p.ultimaUnid = null;
    p.jogadasLocal = {};
    draw(p,1);
    // Passiva Amaterasu: menor unidade +1 se presenca em 2+ locais
    if(p.deus==='amaterasu'){
      const locs = new Set(p.unidades.map(u=>u.loc));
      if(locs.size>=2){
        const u = menorDe(p.unidades, pi);
        if(u){ u.bonus++; log('Sol Nascente: '+u.nome+' de '+p.nome+' ganhou +1.'); }
      }
    }
  }
  log('— Turno '+n+' (+'+n+' de mana para cada um). '+state.players[state.ordem].nome+' revela primeiro.');
}

function canAct(pi){
  if(!state || state.gameOver || state.passPending) return false;
  if(state.jogadas[pi]) return false;
  if(online()) return pi===myIndex;
  if(state.hideHands) return pi===state.vezLocal;
  return true;
}

function gastouAcumulada(p){ return p.gasto > p.renda; }
function acumuladaGasta(p){ return Math.max(0, p.gasto - p.renda); }

function encerrar(pi){
  if(!canAct(pi)) return;
  sel = null;
  state.jogadas[pi] = true;
  log(state.players[pi].nome+' encerrou as jogadas.');
  const outro = 1-pi;
  if(state.jogadas[outro]){
    if(mode==='guest'){ sincronizar(); return; } // host revela
    revelar();
    sincronizar();
    return;
  }
  if(mode==='local' && state.hideHands){
    state.vezLocal = outro;
    state.passPending = true;
  }
  sincronizar();
}

/* ==================== REVELACAO ==================== */
function revelar(){
  log('— REVELACAO do turno '+state.turno+' —');
  const primeiro = state.ordem;
  for(const pi of [primeiro, 1-primeiro]){
    const p = state.players[pi];
    p._odinFeito = false;
    for(const item of p.staging) resolverItem(pi, item);
    p.staging = [];
    // Passiva Thor: gastou acumulada -> menor aliada no local da 1a carta +1
    if(p.deus==='thor' && gastouAcumulada(p) && p.primeiroLocal!=null){
      const cand = p.unidades.filter(u=>u.loc===p.primeiroLocal);
      const u = menorDe(cand, pi);
      if(u){ u.bonus++; log('Trovao Crescente: '+u.nome+' ganhou +1.'); }
    }
  }
  fimDeTurno();
}

function fimDeTurno(){
  // gatilhos de fim de turno, na ordem de revelacao
  for(const pi of [state.ordem, 1-state.ordem]){
    const p = state.players[pi];
    for(const u of p.unidades.slice().sort((a,b)=>a.uid-b.uid)){
      const id = u.id;
      if(id==='at_escudeira'){
        const d = somaPoder(pi,u.loc)-somaPoder(1-pi,u.loc);
        if(d===1||d===2){ u.bonus++; log('Escudeira de Atenas ganhou +1 (vencendo por '+d+').'); }
      }
      if(id==='th_defensor' && somaPoder(pi,u.loc)<somaPoder(1-pi,u.loc)){ u.bonus+=2; log('Defensor de Midgard ganhou +2 (perdendo o local).'); }
      if(id==='am_raio' && p.unidades.filter(x=>x.loc===u.loc).length===1){ u.bonus++; log('Raio da Aurora ganhou +1 (sozinho no local).'); }
      if(id==='am_santuario'){
        const u2 = menorDe(p.unidades.filter(x=>x.loc===u.loc), pi);
        if(u2){ u2.bonus++; log('Santuario do Sol: '+u2.nome+' ganhou +1.'); }
      }
      if(id==='ym_fragmento' && p.mana>0){ u.bonus++; log('Fragmento de Gelo ganhou +1 (mana sobrando).'); }
      if(id==='ym_gigante' && (p.jogadasLocal[u.loc]||0)===0){ u.bonus+=3; log('Gigante Adormecido ganhou +3 (local quieto).'); }
    }
    // Passiva Athena
    if(p.deus==='athena'){
      for(const s of [0,1,2]){
        if(!slotAberto(s)) continue;
        const d = somaPoder(pi,s)-somaPoder(1-pi,s);
        if(d===1||d===2){
          const u = menorDe(p.unidades.filter(x=>x.loc===s), pi);
          if(u){ u.bonus++; log('Estrategia Perfeita: '+u.nome+' ganhou +1 em '+LOCATIONS[state.locais[s]].nome+'.'); }
        }
      }
    }
    // Passiva Ymir
    if(p.deus==='ymir' && p.mana>=2){
      const u = maiorDe(p.unidades, pi);
      if(u){ u.bonus++; log('Frio Primordial: '+u.nome+' ganhou +1 ('+p.mana+' de mana guardada).'); }
    }
    p.sobraAnterior = p.mana;
  }
  // resolucoes
  if(state.turno===TURNO_RESOLVE){
    resolverLocal(0); resolverLocal(1);
    const pl = placarLocais();
    if(pl[0]>=2 || pl[1]>=2){ decidirVencedor(); return; }
    log('Agora tudo se decide no Estagio Final: '+LOCATIONS[state.locais[2]].nome+' (turnos 4 a '+TURNO_FINAL+').');
    iniciarTurno(state.turno+1);
    return;
  }
  if(state.turno>=TURNO_FINAL){ resolverLocal(2); decidirVencedor(); return; }
  iniciarTurno(state.turno+1);
}

function somaPoder(pi, slot){
  return state.players[pi].unidades.filter(u=>u.loc===slot).reduce((s,u)=>s+poderUnidade(u,pi),0);
}
function resolverLocal(slot){
  if(!state.locais[slot] || state.resolvidos[slot]) return;
  const pw = [somaPoder(0,slot), somaPoder(1,slot)];
  let v = -1;
  if(pw[0]>pw[1]) v = 0; else if(pw[1]>pw[0]) v = 1;
  state.resolvidos[slot] = {vencedor:v, poder:pw};
  const l = LOCATIONS[state.locais[slot]];
  log('🏛 '+l.nome+': '+pw[0]+' x '+pw[1]+'. '+(v>=0 ? state.players[v].nome+' conquistou!' : 'Empate — ninguem leva.'));
}
function placarLocais(){
  const c=[0,0];
  for(const r of state.resolvidos) if(r && r.vencedor>=0) c[r.vencedor]++;
  return c;
}
function decidirVencedor(){
  const pl = placarLocais();
  if(pl[0]!==pl[1]){
    const w = pl[0]>pl[1]?0:1;
    state.gameOver = state.players[w].nome+' venceu por '+pl[w]+' Local(is) a '+pl[1-w]+'!';
  }else{
    let t0=0,t1=0;
    for(const r of state.resolvidos) if(r){ t0+=r.poder[0]; t1+=r.poder[1]; }
    if(t0!==t1){
      const w = t0>t1?0:1;
      state.gameOver = 'Empate em Locais. '+state.players[w].nome+' venceu no desempate por poder total ('+t0+' x '+t1+').';
    }else state.gameOver = 'Empate epico! Os deuses recusam o veredito ('+t0+' x '+t1+').';
  }
  log('🏆 '+state.gameOver);
}

/* ==================== PODER / REDUCAO / MOVIMENTO ==================== */
function menorDe(us, pi){ return us.slice().sort((a,b)=>poderUnidade(a,pi)-poderUnidade(b,pi))[0]; }
function maiorDe(us, pi){ return us.slice().sort((a,b)=>poderUnidade(b,pi)-poderUnidade(a,pi))[0]; }
function slotAberto(slot){ return state.locais[slot] && !state.resolvidos[slot]; }
function slotsAbertos(){ return [0,1,2].filter(slotAberto); }
function contestado(slot){
  return state.players[0].unidades.some(u=>u.loc===slot) && state.players[1].unidades.some(u=>u.loc===slot);
}

function poderUnidade(u, pi){
  let v = u.base + u.bonus - u.debuf;
  const lid = state.locais[u.loc];
  if(lid==='arena') v += 1;
  if(lid==='necropole') v -= 1;
  if(lid==='porto' && CARDS[u.id].custo<=3) v += 1;
  if(lid==='templo'){
    const m = state.players[pi].unidades.filter(x=>x.loc===u.loc).length;
    const d = state.players[1-pi].unidades.filter(x=>x.loc===u.loc).length;
    if(m<d) v += 2;
  }
  // Continuos
  if(u.id==='at_falange' || state.players[pi].unidades.some(x=>x.loc===u.loc && x.id==='at_falange')){
    if(state.players[pi].unidades.filter(x=>x.loc===u.loc).length===3) v += 1;
  }
  if(CARDS[u.id].revelar && state.players[pi].unidades.some(x=>x.loc===u.loc && x.id==='od_trono' && x.uid!==u.uid)) v += 1;
  return Math.max(0,v);
}

// Reducao respeitando protecoes. fonte: {tipo:'magia'|'ativa'|'passiva', custo, dePi}
function reduzir(u, piDono, valor, fonte){
  if(valor<=0) return false;
  if(u.protRedAte && u.protRedAte>=state.turno){ log(u.nome+' esta protegida pela Egide — reducao anulada.'); return false; }
  if(u.id==='ym_coracao' && fonte && fonte.tipo==='magia' && fonte.custo<=2){ log('Coracao de Gelo ignorou a magia barata.'); return false; }
  u.debuf += valor;
  if(u.id==='am_guardia'){ // nao reduz abaixo de 1
    const min = u.base + u.bonus - 1;
    if(u.debuf>min) u.debuf = Math.max(0,min);
  }
  return true;
}

// Movimento respeitando travas. causa: {dePi}
function mover(u, piDono, destino, causa){
  if(u.loc===destino) return false;
  if(!slotAberto(destino)) return false;
  if(state.lockAte[u.loc]>=state.turno){ log('Terreno Congelado impediu o movimento de '+u.nome+'.'); return false; }
  if(u.id==='ym_filhogelo' && causa.dePi===piDono){ log('Filho do Gelo recusa ordens: nao se move por efeitos aliados.'); return false; }
  if(u.protMoveAte && u.protMoveAte>=state.turno && causa.dePi!==piDono){ log('Runa de Protecao impediu o oponente de mover '+u.nome+'.'); return false; }
  if(state.players[piDono].unidades.filter(x=>x.loc===destino).length>=CAP_LOCAL){ log('Sem espaco no destino para '+u.nome+'.'); return false; }
  const origem = u.loc;
  u.loc = destino;
  u.movTurno = state.turno;
  state.movidasJogo++;
  log(u.nome+' foi movida de '+LOCATIONS[state.locais[origem]].nome+' para '+LOCATIONS[state.locais[destino]].nome+'.');
  // Passiva Saci: 1a movida do turno
  if(!state.moveuNoTurno){
    state.moveuNoTurno = true;
    for(const [pi,p] of state.players.entries()){
      if(p.deus!=='saci') continue;
      const alvo = menorDe(p.unidades.filter(x=>x.loc===destino), pi);
      if(alvo){ alvo.bonus++; log('Redemoinho Travesso: '+alvo.nome+' ganhou +1.'); }
    }
  }
  // Parede Glacial: primeira inimiga movida para o local
  const opp = 1-piDono;
  for(const parede of state.players[opp].unidades.filter(x=>x.loc===destino && x.id==='ym_parede' && !x.paredeUsada)){
    parede.paredeUsada = true;
    reduzir(u, piDono, 2, {tipo:'passiva', custo:0, dePi:opp});
    log('Parede Glacial congelou '+u.nome+': -2.');
    break;
  }
  return true;
}

/* ==================== JOGAR (staging) ==================== */
function custoCarta(pi, id, slot){
  let c = CARDS[id].custo;
  if(state.players[pi].proxCusto>0) c += 2; // Era do Gelo
  if(slot!=null && CARDS[id].tipo==='unit' && state.locais[slot]==='olimpo') c += 1;
  return c;
}

function selecionarCarta(pi, idx){
  if(!canAct(pi)) return;
  const id = state.players[pi].mao[idx], c = CARDS[id];
  if(!c) return;
  if(sel && sel.tipo==='carta' && sel.idx===idx){ sel = null; render(); return; }
  if(state.players[pi].mana < custoCarta(pi,id)){ log('Mana insuficiente para '+c.nome+'.'); render(); return; }
  if(c.tipo==='unit'){ sel = {tipo:'carta', pi, idx, precisa:['slot']}; }
  else if(c.alvo==='slot'){ sel = {tipo:'carta', pi, idx, precisa:['slot']}; }
  else if(c.alvo==='aliada'){ sel = {tipo:'carta', pi, idx, precisa:['aliada']}; }
  else if(c.alvo==='aliadaSlot'){ sel = {tipo:'carta', pi, idx, precisa:['aliada','slot']}; }
  else { stage(pi, {tipo:'spell', id, idx}); return; }
  render();
}

function usarAtiva(pi){
  if(!canAct(pi)) return;
  const p = state.players[pi], m = MYTHICS[p.deus];
  if(p.ativaUsada){ log('A ativa de '+m.nome+' ja foi usada nesta partida.'); render(); return; }
  if(p.mana<m.custoAtiva){ log('Mana insuficiente para a ativa.'); render(); return; }
  if(m.alvoAtiva==='slot'){ sel = {tipo:'ativa', pi, precisa:['slot']}; render(); return; }
  if(m.alvoAtiva==='aliada'){ sel = {tipo:'ativa', pi, precisa:['aliada']}; render(); return; }
  if(m.alvoAtiva==='aliadaSlot'){ sel = {tipo:'ativa', pi, precisa:['aliada','slot']}; render(); return; }
  stage(pi, {tipo:'ativa'});
}

function clicarAlvoUnidade(pi, uid){
  if(!sel || sel.pi!==pi || sel.precisa[0]!=='aliada') return;
  sel.alvoUid = uid;
  sel.precisa = sel.precisa.slice(1);
  if(!sel.precisa.length){
    if(sel.tipo==='ativa') stage(pi, {tipo:'ativa', alvoUid:uid});
    else stage(pi, {tipo:'spell', id:state.players[pi].mao[sel.idx], idx:sel.idx, alvoUid:uid});
    return;
  }
  render();
}

function clicarSlot(slot){
  if(!sel) return;
  const pi = sel.pi;
  if(sel.precisa[0]!=='slot') return;
  if(!slotAberto(slot)){ log('Esse local ja foi resolvido.'); render(); return; }
  if(sel.tipo==='ativa'){ stage(pi, {tipo:'ativa', alvoUid:sel.alvoUid, slot}); return; }
  const id = state.players[pi].mao[sel.idx];
  if(CARDS[id].tipo==='unit'){
    const totalNoSlot = state.players[pi].unidades.filter(u=>u.loc===slot).length +
      state.players[pi].staging.filter(s=>s.tipo==='unit' && s.slot===slot).length;
    if(totalNoSlot>=CAP_LOCAL){ log('Limite de '+CAP_LOCAL+' unidades no local.'); render(); return; }
    stage(pi, {tipo:'unit', id, idx:sel.idx, slot});
  }else{
    stage(pi, {tipo:'spell', id, idx:sel.idx, alvoUid:sel.alvoUid, slot});
  }
}

function stage(pi, item){
  const p = state.players[pi];
  let custo;
  if(item.tipo==='ativa'){
    custo = MYTHICS[p.deus].custoAtiva;
    p.ativaUsada = true;
  }else{
    custo = custoCarta(pi, item.id, item.slot);
    if(p.mana<custo){ log('Mana insuficiente.'); sel=null; render(); return; }
    p.mao.splice(item.idx,1);
    if(p.proxCusto>0){ p.proxCusto--; item.custoAumentado = true; }
    if(item.tipo==='unit'){
      if(p.primeiroLocal==null) p.primeiroLocal = item.slot;
      p.ultimaUnid = item;
      p.jogadasLocal[item.slot] = (p.jogadasLocal[item.slot]||0)+1;
    }else{
      p.jogouMagia = true;
      if(item.slot!=null) p.jogadasLocal[item.slot] = (p.jogadasLocal[item.slot]||0)+1;
    }
  }
  p.mana -= custo;
  p.gasto += custo;
  item.custo = custo;
  p.staging.push(item);
  sel = null;
  sincronizar();
}

function desfazer(pi){
  if(!canAct(pi)) return;
  const p = state.players[pi];
  const item = p.staging.pop();
  if(!item) return;
  p.mana += item.custo;
  p.gasto -= item.custo;
  if(item.tipo==='ativa'){ p.ativaUsada = false; }
  else{
    p.mao.push(item.id);
    if(item.custoAumentado) p.proxCusto++;
    // recalcula rastreadores a partir do que sobrou
    p.primeiroLocal = null; p.jogouMagia = false; p.ultimaUnid = null; p.jogadasLocal = {};
    for(const s of p.staging){
      if(s.tipo==='unit'){
        if(p.primeiroLocal==null) p.primeiroLocal = s.slot;
        p.ultimaUnid = s;
        p.jogadasLocal[s.slot] = (p.jogadasLocal[s.slot]||0)+1;
      }else if(s.tipo==='spell'){
        p.jogouMagia = true;
        if(s.slot!=null) p.jogadasLocal[s.slot] = (p.jogadasLocal[s.slot]||0)+1;
      }
    }
  }
  log(p.nome+' desfez a ultima jogada.');
  sincronizar();
}

/* ==================== RESOLUCAO DOS ITENS ==================== */
function resolverItem(pi, item){
  const p = state.players[pi], o = state.players[1-pi];
  if(item.tipo==='unit'){ revelarUnidade(pi, item); return; }
  if(item.tipo==='ativa'){ resolverAtiva(pi, item); return; }
  resolverMagia(pi, item);
}

function revelarUnidade(pi, item){
  const p = state.players[pi], o = state.players[1-pi];
  const c = CARDS[item.id], slot = item.slot, lid = state.locais[slot];
  // condicoes "pre-colocacao"
  const perdiaAntes = somaPoder(pi,slot) < somaPoder(1-pi,slot);
  const unidadesAntes = p.unidades.filter(x=>x.loc===slot).length;
  const inimigasAntes = o.unidades.filter(x=>x.loc===slot).length;
  const u = {uid:uidSeq++, id:item.id, nome:c.nome, base:c.poder, bonus:0, debuf:0, loc:slot};
  if(lid==='forja') u.bonus++;
  // pendentes no local (Plano Antecipado / No no Caminho)
  state.pend[slot] = state.pend[slot].filter(pd=>{
    if(pd.expiraTurno && pd.expiraTurno<state.turno) return false;
    if(pd.tipo==='aliada' && pd.dono===pi){ u.bonus += pd.valor; log(u.nome+' recebeu +'+pd.valor+' (Plano Antecipado).'); return false; }
    if(pd.tipo==='inimiga' && pd.dono!==pi){ u.debuf += pd.valor; log(u.nome+' caiu no No no Caminho: -'+pd.valor+'.'); return false; }
    return true;
  });
  // Passiva Odin: primeira unidade "ao revelar" do turno
  if(p.deus==='odin' && c.revelar && !p._odinFeito){ p._odinFeito = true; u.bonus++; log('Sabedoria do Pai de Todos: '+u.nome+' ganhou +1.'); }
  p.unidades.push(u);
  log(p.nome+' revelou '+c.nome+' em '+LOCATIONS[lid].nome+'.');
  if(lid==='delfos'){ draw(p,1); log('Delfos: '+p.nome+' comprou 1 carta.'); }
  if(c.revelar){
    if(lid==='labirinto'){ log('Labirinto de Creta silenciou o "ao revelar" de '+c.nome+'.'); }
    else efeitoRevelar(pi, u, {perdiaAntes, unidadesAntes, inimigasAntes});
  }
}

function efeitoRevelar(pi, u, ctx, opt){
  opt = opt || {};
  const p = state.players[pi], o = state.players[1-pi];
  const slot = u.loc;
  const podeComprar = !opt.semCompra;
  const penalidade = opt.drawPenalty||0;
  const id = u.id;
  const compre = n => { const q = Math.max(0, n - penalidade); if(q>0){ draw(p,q); } return q; };
  if(id==='at_coruja'){
    if(!podeComprar) return;
    const perdendo = slotsAbertos().some(s=>somaPoder(pi,s)<somaPoder(1-pi,s));
    if(perdendo){ const q=compre(1); log('Coruja Estrategica avistou perigo: comprou '+q+' carta(s).'); }
  }
  if(id==='at_hoplita' && p.unidades.some(x=>x.loc===slot && x.uid!==u.uid)){ u.bonus++; log('Hoplita Disciplinado ganhou +1 (aliada presente).'); }
  if(id==='at_general' && (ctx?ctx.perdiaAntes:somaPoder(pi,slot)<somaPoder(1-pi,slot))){ u.bonus+=2; log('General de Atenas ganhou +2 (chegou perdendo).'); }
  if(id==='at_vitoria'){
    let dom = 0;
    for(const s of [0,1,2]){
      if(state.resolvidos[s] && state.resolvidos[s].vencedor===pi) dom++;
      else if(slotAberto(s) && somaPoder(pi,s)>somaPoder(1-pi,s)) dom++;
    }
    if(dom===1){ u.bonus+=2; log('Vitoria Calculada ganhou +2 (domina exatamente 1 local).'); }
  }
  if(id==='at_campea'){
    const d = somaPoder(pi,slot)-somaPoder(1-pi,slot);
    if(d===1||d===2){ u.bonus+=4; log('Campea de Athena ganhou +4 (vencendo por '+d+').'); }
    else { u.bonus+=1; log('Campea de Athena ganhou +1.'); }
  }
  if(id==='th_faisca' && p.carry>0){ u.bonus+=2; log('Faisca de Asgard ganhou +2 (mana acumulada).'); }
  if(id==='th_guerreiro' && contestado(slot)){ u.bonus++; log('Guerreiro de Asgard ganhou +1 (local contestado).'); }
  if(id==='th_filho' && gastouAcumulada(p)){ u.bonus+=3; log('Filho da Tempestade ganhou +3 (mana acumulada gasta).'); }
  if(id==='th_digno' && (ctx?ctx.perdiaAntes:somaPoder(pi,slot)<somaPoder(1-pi,slot))){ u.bonus+=3; log('Digno do Martelo ganhou +3 (chegou perdendo).'); }
  if(id==='th_avatar'){ const g = Math.min(4, Math.floor(acumuladaGasta(p)/2)); if(g>0){ u.bonus+=g; log('Avatar do Trovao ganhou +'+g+'.'); } }
  if(id==='od_corvo'){
    if(!podeComprar) return;
    const topo = p.deck[p.deck.length-1];
    if(topo && CARDS[topo].custo<=2 && penalidade===0){ draw(p,1); log('Corvo Observador trouxe '+CARDS[topo].nome+' do topo do deck.'); }
    else log('Corvo Observador olhou o topo, mas nao trouxe nada.');
  }
  if(id==='od_mensageiro' && podeComprar){ const q=compre(1); log('Mensageiro de Asgard: comprou '+q+' carta(s).'); }
  if(id==='od_hugin' && podeComprar){
    const q=compre(1);
    if(p.mao.length){ const i=Math.floor(Math.random()*p.mao.length); const [d]=p.mao.splice(i,1); p.descarte.push(d); log('Hugin e Munin: comprou '+q+' e descartou '+CARDS[d].nome+'.'); }
  }
  if(id==='od_guardiao' && p.jogouMagia){ u.bonus+=2; log('Guardiao das Runas ganhou +2 (magia jogada).'); }
  if(id==='od_valhalla'){
    const alvo = p.unidades.find(x=>x.loc===slot && x.uid!==u.uid && CARDS[x.id].custo===1 && CARDS[x.id].revelar);
    if(alvo){ log('Guardiao de Valhalla reativa '+alvo.nome+'!'); efeitoRevelar(pi, alvo, null, {}); }
  }
  if(id==='od_chamado'){
    for(const alvo of p.unidades.filter(x=>x.loc===slot && x.uid!==u.uid && CARDS[x.id].revelar)){
      if(DRAW_FX.includes(alvo.id)) continue;
      log('Chamado de Odin reativa '+alvo.nome+'!');
      efeitoRevelar(pi, alvo, null, {semCompra:true});
    }
  }
  if(id==='am_chama'){
    const outras = p.unidades.filter(x=>x.loc===slot && x.uid!==u.uid);
    outras.forEach(x=>x.bonus++);
    if(outras.length) log('Chama Serena: +1 em '+outras.length+' aliada(s).');
  }
  if(id==='am_miko'){
    const venceOutro = slotsAbertos().some(s=>s!==slot && somaPoder(pi,s)>somaPoder(1-pi,s)) ||
      state.resolvidos.some(r=>r && r.vencedor===pi);
    if(venceOutro){ u.bonus+=3; log('Miko Radiante ganhou +3 (vencendo outro local).'); }
  }
  if(id==='am_kagayaki'){
    for(const s of slotsAbertos()){
      const alvo = menorDe(p.unidades.filter(x=>x.loc===s), pi);
      if(alvo){ alvo.bonus+=2; log('Kagayaki iluminou '+alvo.nome+': +2.'); }
    }
  }
  if(id==='ym_jotun' && gastouAcumulada(p)){ u.bonus++; log('Jotun Guerreiro ganhou +1.'); }
  if(id==='ym_colosso'){ const g = Math.min(4, p.sobraAnterior); if(g>0){ u.bonus+=g; log('Colosso Primordial ganhou +'+g+' (mana guardada).'); } }
  if(id==='ym_desperto'){
    const antes = ctx ? ctx.inimigasAntes : o.unidades.filter(x=>x.loc===slot).length;
    const minhas = ctx ? ctx.unidadesAntes : p.unidades.filter(x=>x.loc===slot).length-1;
    if(minhas < antes){ u.bonus+=3; log('Ymir Desperto ganhou +3 (em menor numero).'); }
  }
  if(id==='sa_moleque' && (ctx?ctx.perdiaAntes:false)){ u.bonus++; log('Moleque Travesso ganhou +1 (chegou perdendo).'); }
  if(id==='sa_cachimbo'){
    if(state.turno>=TURNO_FINAL){ log('Cachimbo Encantado nao funciona no turno 6.'); }
    else if(o.mao.length){
      const menor = o.mao.slice().sort((a,b)=>CARDS[a].custo-CARDS[b].custo)[0];
      o.mao.splice(o.mao.indexOf(menor),1); o.descarte.push(menor);
      log('Cachimbo Encantado: '+o.nome+' descartou '+CARDS[menor].nome+'.');
    }
  }
  if(id==='sa_pulo'){
    const dest = slotsAbertos().filter(s=>s!==slot && p.unidades.filter(x=>x.loc===s).length<CAP_LOCAL);
    if(dest.length && mover(u, pi, rand(dest), {dePi:pi})){ u.bonus+=2; log('Pulo de Uma Perna So: +2.'); }
  }
  if(id==='sa_forte'){
    const outras = p.unidades.filter(x=>x.loc===slot && x.uid!==u.uid);
    const alvo = menorDe(outras, pi);
    if(alvo){
      const dest = slotsAbertos().filter(s=>s!==slot && p.unidades.filter(x=>x.loc===s).length<CAP_LOCAL);
      if(dest.length && mover(alvo, pi, rand(dest), {dePi:pi})){ alvo.bonus+=2; log('Redemoinho Forte: '+alvo.nome+' ganhou +2.'); }
    }
  }
  if(id==='sa_guardiao' && state.moveuNoTurno){ u.bonus+=3; log('Guardiao da Mata ganhou +3 (houve movimento).'); }
  if(id==='sa_noite'){ const g = Math.min(5, state.movidasJogo); if(g>0){ u.bonus+=g; log('Saci em Noite de Vento ganhou +'+g+'.'); } }
}

function resolverMagia(pi, item){
  const p = state.players[pi], o = state.players[1-pi];
  const id = item.id, c = CARDS[id], slot = item.slot;
  const fonte = {tipo:'magia', custo:c.custo, dePi:pi};
  const alvoAliada = () => {
    for(const [qi,q] of state.players.entries()) { const u = q.unidades.find(x=>x.uid===item.alvoUid); if(u && qi===pi) return u; }
    return null;
  };
  log(p.nome+' revelou a magia '+c.nome+'.');
  if(id==='at_lanca' || id==='th_martelo'){
    const u = maiorDe(o.unidades.filter(x=>x.loc===slot), 1-pi);
    if(u){ reduzir(u, 1-pi, 2, fonte) && log(c.nome+': '+u.nome+' perdeu 2.'); } else log(c.nome+' nao achou alvo.');
  }
  if(id==='at_repos'){
    const u = alvoAliada();
    if(u) mover(u, pi, slot, {dePi:pi});
  }
  if(id==='at_plano'){ state.pend[slot].push({tipo:'aliada', dono:pi, valor:3, expiraTurno:state.turno}); log('Plano Antecipado armado em '+LOCATIONS[state.locais[slot]].nome+'.'); }
  if(id==='at_egide'){
    const u = alvoAliada();
    if(u){ u.bonus+=2; u.protRedAte = state.turno+1; log('Egide: '+u.nome+' ganhou +2 e protecao.'); }
  }
  if(id==='at_cerco'){
    const perdendo = slotsAbertos().filter(s=>somaPoder(pi,s)<somaPoder(1-pi,s));
    const u = menorDe(p.unidades.filter(x=>slotAberto(x.loc)), pi);
    if(u && perdendo.length){
      const dest = perdendo.filter(s=>s!==u.loc && p.unidades.filter(x=>x.loc===s).length<CAP_LOCAL)[0];
      if(dest!=null && mover(u, pi, dest, {dePi:pi})){ u.bonus+=4; log('Cerco Inteligente: '+u.nome+' ganhou +4.'); }
      else log('Cerco Inteligente sem destino valido.');
    } else log('Cerco Inteligente sem alvo.');
  }
  if(id==='th_trovao'){
    const u = alvoAliada();
    if(u){ const g = gastouAcumulada(p)?3:2; u.bonus+=g; log('Trovao Menor: '+u.nome+' ganhou +'+g+'.'); }
  }
  if(id==='th_bifrost'){
    const u = alvoAliada();
    if(u){
      const dest = slotsAbertos().filter(s=>s!==u.loc && contestado(s) && p.unidades.filter(x=>x.loc===s).length<CAP_LOCAL)[0];
      if(dest!=null && mover(u, pi, dest, {dePi:pi})){ u.bonus+=2; log('Ponte Bifrost: '+u.nome+' ganhou +2.'); }
      else log('Ponte Bifrost sem local contestado para ir.');
    }
  }
  if(id==='th_raio'){
    let feitos = 0;
    for(const s of slotsAbertos()){
      if(feitos>=2) break;
      const u = maiorDe(o.unidades.filter(x=>x.loc===s), 1-pi);
      if(u && reduzir(u, 1-pi, 1, fonte)){ feitos++; log('Raio Bifurcado atingiu '+u.nome+': -1.'); }
    }
  }
  if(id==='th_furia'){
    if(!contestado(slot)){ log('Furia do Trovao exige local contestado — nada aconteceu.'); }
    else{
      p.unidades.filter(x=>x.loc===slot).forEach(x=>x.bonus++);
      o.unidades.filter(x=>x.loc===slot).forEach(x=>reduzir(x, 1-pi, 1, fonte));
      log('Furia do Trovao: aliadas +1, inimigas -1.');
    }
  }
  if(id==='od_runap'){
    const u = alvoAliada();
    if(u){ u.bonus++; log('Runa Pequena: '+u.nome+' +1.'); }
    if(p.carry>=3){ draw(p,1); log('Runa Pequena: comprou 1 carta (mana acumulada).'); }
  }
  if(id==='od_protecao'){
    const u = alvoAliada();
    if(u){ u.bonus+=2; u.protMoveAte = state.turno+1; log('Runa de Protecao: '+u.nome+' +2 e ancorada.'); }
  }
  if(id==='od_conselho'){
    const ult = p.ultimaUnid;
    if(ult && CARDS[ult.id].custo<=2 && CARDS[ult.id].revelar){
      const u = p.unidades.slice().reverse().find(x=>x.id===ult.id);
      if(u){ log('Conselho de Odin reativa '+u.nome+'!'); efeitoRevelar(pi, u, null, {}); }
    } else log('Conselho de Odin sem unidade valida (custo 2 ou menos).');
  }
  if(id==='od_olho'){
    const gastavel = p.mana;
    p.mana = 0; p.gasto += gastavel;
    const q = Math.min(3, Math.floor(gastavel/2));
    if(q>0) draw(p,q);
    log('Olho Sacrificado: gastou '+gastavel+' de mana e comprou '+q+' carta(s).');
  }
  if(id==='od_decreto'){
    const inim = maiorDe(o.unidades.filter(x=>x.loc===slot), 1-pi);
    if(inim) reduzir(inim, 1-pi, 3, fonte) && log('Decreto: '+inim.nome+' -3.');
    const ali = menorDe(p.unidades.filter(x=>x.loc===slot), pi);
    if(ali){ ali.bonus+=3; log('Decreto: '+ali.nome+' +3.'); }
  }
  if(id==='am_espelho'){
    const u = alvoAliada();
    if(u){ const rem = Math.min(2,u.debuf); u.debuf-=rem; u.bonus++; log('Espelho Sagrado: removeu '+rem+' de reducao e deu +1 a '+u.nome+'.'); }
  }
  if(id==='am_luz'){
    const u = menorDe(p.unidades, pi);
    if(u){
      const locs = new Set(p.unidades.map(x=>x.loc));
      const g = locs.size>=2?3:2;
      u.bonus+=g; log('Luz Matinal: '+u.nome+' ganhou +'+g+'.');
    }
  }
  if(id==='am_caminho'){
    const u = alvoAliada();
    if(u){
      const abertos = slotsAbertos().filter(s=>s!==u.loc && p.unidades.filter(x=>x.loc===s).length<CAP_LOCAL);
      const dest = abertos.sort((a,b)=>somaPoder(pi,a)-somaPoder(pi,b))[0];
      if(dest!=null && mover(u, pi, dest, {dePi:pi})){ u.bonus+=2; log('Caminho do Sol: '+u.nome+' +2.'); }
    }
  }
  if(id==='am_arco'){
    const cands = slotsAbertos().filter(s=>p.unidades.filter(x=>x.loc===s).length < o.unidades.filter(x=>x.loc===s).length);
    let melhor = null, mu = null;
    for(const s of cands){
      const u = maiorDe(o.unidades.filter(x=>x.loc===s), 1-pi);
      if(u && (!mu || poderUnidade(u,1-pi)>poderUnidade(mu,1-pi))){ mu=u; melhor=s; }
    }
    if(mu){ reduzir(mu, 1-pi, 2, fonte) && log('Arco Celestial: '+mu.nome+' -2.'); }
    else log('Arco Celestial sem local em desvantagem numerica.');
  }
  if(id==='am_aurora'){
    p.unidades.forEach(x=>x.bonus++);
    log('Aurora Crescente: +1 em todas as suas unidades.');
    if(state.locais[2]){ const u = menorDe(p.unidades, pi); if(u){ u.bonus++; log('Aurora Crescente: +1 extra em '+u.nome+'.'); } }
  }
  if(id==='ym_neve'){
    const u = maiorDe(o.unidades.filter(x=>slotAberto(x.loc)), 1-pi);
    if(u){ const v = p.carry>=2?2:1; reduzir(u, 1-pi, v, fonte) && log('Neve Viva: '+u.nome+' -'+v+'.'); }
  }
  if(id==='ym_sopro'){
    const u = maiorDe(o.unidades.filter(x=>x.loc===slot), 1-pi);
    if(u && poderUnidade(u,1-pi)>=5){ reduzir(u, 1-pi, 3, fonte) && log('Sopro Congelante: '+u.nome+' -3.'); }
    else log('Sopro Congelante exige alvo com 5+ de poder.');
  }
  if(id==='ym_terreno'){ state.lockAte[slot] = state.turno+1; log('Terreno Congelado: '+LOCATIONS[state.locais[slot]].nome+' travado ate o fim do proximo turno.'); }
  if(id==='ym_avalanche'){
    const total = p.unidades.filter(x=>x.loc===slot).length + o.unidades.filter(x=>x.loc===slot).length;
    if(total>=4){
      o.unidades.filter(x=>x.loc===slot).forEach(x=>reduzir(x, 1-pi, 2, fonte));
      log('Avalanche: -2 em todas as inimigas do local.');
    } else log('Avalanche exige 4+ unidades no local.');
  }
  if(id==='sa_redemoinho'){
    const u = rand(p.unidades.filter(x=>slotAberto(x.loc)) || []);
    if(u){
      const dest = slotsAbertos().filter(s=>s!==u.loc && p.unidades.filter(x=>x.loc===s).length<CAP_LOCAL);
      if(dest.length && mover(u, pi, rand(dest), {dePi:pi})){ u.bonus++; log('Redemoinho Pequeno: '+u.nome+' +1.'); }
    }
  }
  if(id==='sa_assobio'){
    const u = menorDe(o.unidades.filter(x=>x.loc===slot), 1-pi);
    if(u){
      const dest = slotsAbertos().filter(s=>s!==slot && o.unidades.filter(x=>x.loc===s).length<CAP_LOCAL);
      if(dest.length) mover(u, 1-pi, rand(dest), {dePi:pi});
    }
  }
  if(id==='sa_pegadinha'){
    const u = maiorDe(o.unidades.filter(x=>x.movTurno===state.turno), 1-pi);
    if(u){ reduzir(u, 1-pi, 2, fonte) && log('Pegadinha: '+u.nome+' -2.'); }
    else log('Pegadinha sem inimiga movida neste turno.');
  }
  if(id==='sa_no'){ state.pend[slot].push({tipo:'inimiga', dono:pi, valor:2, expiraTurno:null}); log('No no Caminho armado em '+LOCATIONS[state.locais[slot]].nome+'.'); }
  if(id==='sa_sumico'){
    if(state.turno>=TURNO_FINAL){ log('Sumico Rapido nao funciona no turno 6.'); }
    else{
      const u = menorDe(o.unidades.filter(x=>x.loc===slot), 1-pi);
      if(u){ o.unidades = o.unidades.filter(x=>x.uid!==u.uid); o.mao.push(u.id); log('Sumico Rapido: '+u.nome+' voltou para a mao de '+o.nome+'.'); }
    }
  }
  if(id==='sa_confusao'){
    for(const [qi,q] of state.players.entries()){
      const u = rand(q.unidades.filter(x=>slotAberto(x.loc)) || []);
      if(!u) continue;
      const dest = slotsAbertos().filter(s=>s!==u.loc && q.unidades.filter(x=>x.loc===s).length<CAP_LOCAL);
      if(dest.length && mover(u, qi, rand(dest), {dePi:pi}) && qi===pi){ u.bonus++; log('Confusao Geral: '+u.nome+' +1.'); }
    }
  }
  state.players[pi].descarte.push(id);
}

function resolverAtiva(pi, item){
  const p = state.players[pi], o = state.players[1-pi], m = MYTHICS[p.deus];
  log(p.nome+' usou a ATIVA: '+m.nome+'!');
  if(p.deus==='athena'){
    const u = p.unidades.find(x=>x.uid===item.alvoUid);
    if(u && item.slot!=null){
      const perdia = somaPoder(pi,item.slot) < somaPoder(1-pi,item.slot);
      if(mover(u, pi, item.slot, {dePi:pi}) && perdia){ u.bonus+=2; log('Plano de Batalha: '+u.nome+' ganhou +2.'); }
    }
  }
  if(p.deus==='thor'){
    const slot = item.slot;
    const u = maiorDe(o.unidades.filter(x=>x.loc===slot), 1-pi);
    if(u){
      const d = Math.abs(somaPoder(pi,slot)-somaPoder(1-pi,slot));
      const v = d<=2 ? 4 : 3;
      reduzir(u, 1-pi, v, {tipo:'ativa', custo:3, dePi:pi}) && log('Mjolnir esmagou '+u.nome+': -'+v+'.');
    } else log('Mjolnir nao achou alvo no local.');
    if(nickIsGuto(p.nome)){
      const digno = p.unidades.find(x=>x.id==='th_digno');
      if(digno){
        digno.bonus += 100;
        log('Efeito oculto de Thor: '+digno.nome+' reconheceu Guto e ganhou +100 de poder.');
      }else{
        log('Efeito oculto de Thor: Guto foi reconhecido, mas Digno do Martelo nao estava em campo.');
      }
    }
  }
  if(p.deus==='odin'){
    const u = p.unidades.find(x=>x.uid===item.alvoUid);
    if(u && CARDS[u.id].revelar){ log('Runa de Repeticao reativa '+u.nome+'!'); efeitoRevelar(pi, u, null, {drawPenalty:1}); }
  }
  if(p.deus==='amaterasu'){
    const u = p.unidades.find(x=>x.uid===item.alvoUid);
    if(u){ const rem = u.debuf; u.debuf = 0; u.bonus+=2; log('Luz Purificadora: removeu '+rem+' de reducao e deu +2 a '+u.nome+'.'); }
  }
  if(p.deus==='ymir'){ o.proxCusto += 2; log('Era do Gelo: as proximas 2 cartas de '+o.nome+' custam +2.'); }
  if(p.deus==='saci'){
    const u = rand(o.unidades.filter(x=>slotAberto(x.loc)) || []);
    if(u){
      const dest = slotsAbertos().filter(s=>s!==u.loc && o.unidades.filter(x=>x.loc===s).length<CAP_LOCAL);
      if(dest.length && mover(u, 1-pi, rand(dest), {dePi:pi})) reduzir(u, 1-pi, 1, {tipo:'ativa', custo:3, dePi:pi});
    }
  }
}

/* ==================== REDE ==================== */
function gerarCodigo(){ const A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<5;i++) s+=A[Math.floor(Math.random()*A.length)]; return s; }
function statusLobby(h){ lobbyStatus=h; const el=$('#statusLobby'); if(el) el.innerHTML=h; }
function temPeerJS(){ if(typeof Peer==='undefined'){ statusLobby('Modo online indisponivel (sem internet?).'); return false; } return true; }
function fecharRede(){
  try{ if(conn) conn.close(); }catch(e){}
  try{ for(const c of conns) c.close(); }catch(e){}
  try{ if(peer) peer.destroy(); }catch(e){}
  peer=null; conn=null; conns=[];
}
function enviarRede(msg, exceto=null){
  if(mode==='host'){ for(const c of conns) if(c!==exceto && c.open) c.send(msg); }
  else if(mode==='guest' && conn && conn.open) conn.send(msg);
}
function sincronizar(exceto=null){
  if(online()) enviarRede({t:'state', state}, exceto);
  render();
}
// Estado remoto durante o staging: preserva o MEU lado (jogadas simultaneas)
function aplicarEstadoRemoto(remoto){
  if(!state || remoto.gameOver || remoto.turno!==state.turno){
    state = remoto;
    sel = null;
    render();
    return;
  }
  const meu = state.players[myIndex];
  const minhaFlag = state.jogadas[myIndex];
  state = remoto;
  state.players[myIndex] = meu;
  state.jogadas[myIndex] = minhaFlag;
  if(mode==='host' && state.jogadas[0] && state.jogadas[1] && !state.gameOver){
    revelar();
    sincronizar();
    return;
  }
  render();
}
function criarSala(){
  if(!temPeerJS()) return;
  fecharRede();
  const codigo = gerarCodigo();
  statusLobby('Criando sala...');
  peer = new Peer('ageguthology-'+codigo, {debug:0});
  peer.on('open', ()=>{
    mode='host'; myIndex=0;
    statusLobby('Sala criada. Envie este codigo:<span class="codigo">'+codigo+'</span>Aguardando Jogador 2...');
  });
  peer.on('connection', c=>{
    if(state || conns.length>=1){ c.on('open',()=>c.close()); return; }
    conns=[c];
    c.on('data', msg=>receberDoConvidado(c,msg));
    c.on('close', ()=>desconectado('Jogador 2 desconectou.'));
  });
  peer.on('error', e=>statusLobby('Erro ao criar sala: '+e.type+'.'));
}
function receberDoConvidado(c,msg){
  if(!msg || typeof msg!=='object') return;
  if(msg.t==='hello' && !state){
    state = criarEstado($('#p1Mythic').value, msg.deus||'athena',
      cleanNick($('#p1Name').value,'Jogador 1'), cleanNick(msg.name,'Jogador 2'), true);
    log('Partida online iniciada. Jogadas simultaneas e maos privadas.');
    iniciarTurno(1);
    c.send({t:'init', state, index:1});
    statusLobby('');
    render();
  }else if(msg.t==='state' && state){
    aplicarEstadoRemoto(msg.state);
    enviarRede({t:'state', state}, c);
  }
}
function entrarSala(){
  if(!temPeerJS()) return;
  fecharRede();
  const codigo = ($('#inpCodigo').value||'').trim().toUpperCase();
  if(codigo.length!==5){ statusLobby('Digite o codigo de 5 caracteres.'); return; }
  statusLobby('Conectando...');
  peer = new Peer({debug:0});
  peer.on('open', ()=>{
    conn = peer.connect('ageguthology-'+codigo, {reliable:true});
    conn.on('open', ()=>{
      mode='guest'; myIndex=1;
      conn.send({t:'hello', deus:$('#p2Mythic').value, name:cleanNick($('#p2Name').value,'Jogador 2')});
      statusLobby('Conectado. Aguardando o host...');
    });
    conn.on('data', msg=>{
      if(!msg||typeof msg!=='object') return;
      if(msg.t==='init'){ state=msg.state; myIndex=msg.index; mode='guest'; render(); }
      else if(msg.t==='state') aplicarEstadoRemoto(msg.state);
    });
    conn.on('close', ()=>desconectado('Conexao perdida com o host.'));
  });
  peer.on('error', e=>{
    if(e.type==='peer-unavailable') statusLobby('Sala nao encontrada.');
    else statusLobby('Erro de conexao: '+e.type+'.');
  });
}
function desconectado(msg){
  if(!state){ statusLobby(msg); return; }
  log(msg);
  mode='local'; myIndex=null;
  render();
}
function resetar(){
  fecharRede();
  state=null; mode='local'; myIndex=null; lobbyStatus=''; sel=null;
  render();
}
function confirmarPasse(){ state.passPending=false; sel=null; render(); }

/* ==================== RENDER ==================== */
function render(){
  if(!state){ renderSetup(); return; }
  const bottom = online() ? myIndex : (state.hideHands ? state.vezLocal : 0);
  const top = 1-bottom;
  const pl = placarLocais();
  $('#app').innerHTML =
    '<div class="table">'+
      '<div class="topbar">'+
        '<div class="brand">AGE OF GUTHOLOGY</div>'+
        '<span class="pill">Turno <b>'+state.turno+'/'+TURNO_FINAL+'</b></span>'+
        '<span class="pill">Revela 1º <b>'+state.players[state.ordem].nome+'</b></span>'+
        '<span class="pill'+(state.jogadas[0]?' ok':'')+'">'+state.players[0].nome+' <b>'+(state.jogadas[0]?'pronto':'jogando')+'</b></span>'+
        '<span class="pill'+(state.jogadas[1]?' ok':'')+'">'+state.players[1].nome+' <b>'+(state.jogadas[1]?'pronto':'jogando')+'</b></span>'+
        '<span class="pill">Placar <b>'+pl[0]+' x '+pl[1]+'</b></span>'+
        '<div class="grow"></div><button onclick="resetar()">Novo teste</button>'+
      '</div>'+
      renderPzone(top, false)+
      '<div class="board">'+
        renderSlot(0,'L',top,bottom)+renderCentro(top,bottom)+renderSlot(1,'R',top,bottom)+
      '</div>'+
      renderHint(bottom)+
      renderPzone(bottom, true)+
      '<details class="logwrap" open><summary>Log de regras</summary><div class="log">'+
        state.log.map(x=>'<div>'+x+'</div>').join('')+
      '</div></details>'+
    '</div>'+renderOverlay();
}

function renderPzone(pi, isBottom){
  const p = state.players[pi], m = MYTHICS[p.deus];
  const podeAgir = canAct(pi);
  const strip =
    '<div class="pstrip'+(state.jogadas[pi]?' done':'')+'">'+
      '<div class="avatar" style="background-image:url('+m.img+')"></div>'+
      '<div><div class="pname">'+p.nome+'</div><div class="god">'+m.nome+'</div></div>'+
      '<span class="stat mana">⬡ '+p.mana+(p.carry>0?' <small>('+p.carry+' acum.)</small>':'')+'</span>'+
      '<span class="stat">Deck '+p.deck.length+'</span>'+
      '<span class="stat">Mao '+p.mao.length+'</span>'+
      (p.proxCusto>0?'<span class="stat win">❄ +'+p.proxCusto+' custo</span>':'')+
      '<div class="acts">'+
        '<button onclick="usarAtiva('+pi+')" '+((p.ativaUsada||!podeAgir)?'disabled':'')+'>Ativa ('+m.custoAtiva+'⬡)</button>'+
        '<button onclick="desfazer('+pi+')" '+((!podeAgir||!p.staging.length)?'disabled':'')+'>Desfazer</button>'+
        '<button onclick="encerrar('+pi+')" '+(!podeAgir?'disabled':'')+'>'+(state.jogadas[pi]?'Aguardando...':'Encerrar')+'</button>'+
      '</div>'+
    '</div>';
  const kit =
    '<div class="god-panel">'+
      '<div class="gp-row">🛡 <b>Passiva:</b> '+m.passiva+'</div>'+
      '<div class="gp-row">⚡ <b>Ativa'+(p.ativaUsada?' (usada)':'')+':</b> '+m.ativa+'</div>'+
    '</div>';
  const hand = renderHand(pi);
  return '<div class="pzone">'+(isBottom ? strip+kit+hand : hand+kit+strip)+'</div>';
}

function verMao(pi){
  if(state.gameOver) return true;
  if(online()) return pi===myIndex;
  if(!state.hideHands) return true;
  return pi===state.vezLocal && !state.passPending;
}

function renderHand(pi){
  const p = state.players[pi];
  if(!verMao(pi)){
    const dorsos = Array(Math.min(p.mao.length,9)).fill('<div class="cardback"></div>').join('');
    return '<div class="hand-row oculta">'+dorsos+'<span class="hidden-note">Mao de '+p.nome+': '+p.mao.length+' carta(s)</span></div>';
  }
  const podeAgir = canAct(pi);
  const cards = p.mao.map((id,idx)=>{
    const c = CARDS[id], custo = custoCarta(pi,id);
    const paga = p.mana>=custo;
    const cls = ['hcard', c.tipo==='unit'?'unit':'spell'];
    if(c.img) cls.push('has-art');
    if(!podeAgir || !paga) cls.push('dead');
    if(sel && sel.tipo==='carta' && sel.pi===pi && sel.idx===idx) cls.push('selected');
    return '<div class="'+cls.join(' ')+'" onclick="selecionarCarta('+pi+','+idx+')">'+
      (c.img?'<div class="card-art" style="background-image:url('+c.img+')"></div>':'')+
      '<div class="cost">'+custo+'</div><h4>'+c.nome+'</h4>'+
      (c.tipo==='unit' ? '<div class="pow">'+c.poder+' <span>PODER</span></div>' : '<div class="pow">✦ <span>MAGIA</span></div>')+
      '<div class="fx">'+(c.texto||'')+'</div>'+
    '</div>';
  }).join('');
  return '<div class="hand-row">'+(cards||'<span class="hidden-note">Sem cartas.</span>')+'</div>';
}

function renderHint(bottom){
  if(!sel) return '';
  const passo = sel.precisa[0];
  const nomeCoisa = sel.tipo==='ativa' ? 'ATIVA de '+MYTHICS[state.players[sel.pi].deus].nome
    : CARDS[state.players[sel.pi].mao[sel.idx]].nome;
  const txt = passo==='aliada' ? 'Escolha uma unidade SUA no tabuleiro' : 'Escolha o LOCAL (clique na carta do local)';
  return '<div class="hintbar">🎯 '+nomeCoisa+': '+txt+
    '<button onclick="sel=null;render()">Cancelar</button></div>';
}

function renderCentro(top,bottom){
  if(state.locais[2]) return renderSlot(2,'C',top,bottom);
  return '<div class="slot slot-C"><div class="statuscard">'+
    '<b>Turno '+state.turno+' de '+TURNO_FINAL+'</b><br>'+
    'Jogadas simultaneas: cada um joga em segredo e confirma.<br>'+
    'O <b>Estagio Final</b> surge AQUI no inicio do turno <b>'+TURNO_RESOLVE+'</b>.<br>'+
    'Os 2 locais resolvem no fim do turno '+TURNO_RESOLVE+'; o Estagio decide nos turnos 4-'+TURNO_FINAL+'.<br>'+
    '<span style="color:var(--muted);font-size:12px">Mana nao gasta acumula. Revela primeiro: '+state.players[state.ordem].nome+'.</span>'+
  '</div></div>';
}

function renderSlot(slot, area, top, bottom){
  const lid = state.locais[slot], l = LOCATIONS[lid];
  const res = state.resolvidos[slot];
  const aberto = slotAberto(slot);
  const clicavel = aberto && sel && sel.precisa && sel.precisa[0]==='slot' && canAct(sel.pi);
  const lane = pi => {
    const p = state.players[pi];
    const units = p.unidades.filter(u=>u.loc===slot);
    const stagedAqui = p.staging.filter(s=>s.slot===slot);
    const mostrar = verMao(pi) || state.gameOver;
    let extra = '';
    for(const s of stagedAqui){
      if(mostrar){
        const c = s.tipo==='ativa' ? {nome:'ATIVA: '+MYTHICS[p.deus].nome, poder:''} : CARDS[s.id];
        extra += '<div class="uchip staged"><span class="upow">'+(s.tipo==='unit'?c.poder:'✦')+'</span><span class="uname">'+c.nome+' <small>(aguarda)</small></span></div>';
      }else{
        extra += '<div class="uchip facedown">? ? ?</div>';
      }
    }
    const chips = units.map(u=>{
      const alvo = sel && sel.precisa && sel.precisa[0]==='aliada' && sel.pi===pi && canAct(pi);
      return '<div class="uchip'+(alvo?' targetable':'')+'"'+(alvo?' onclick="clicarAlvoUnidade('+pi+','+u.uid+')"':'')+' title="'+CARDS[u.id].texto+'">'+
        '<span class="upow">'+poderUnidade(u,pi)+'</span>'+
        '<span class="uname">'+u.nome+((u.bonus-u.debuf)!==0?' <small>('+((u.bonus-u.debuf)>0?'+':'')+(u.bonus-u.debuf)+')</small>':'')+'</span>'+
        (CARDS[u.id].texto && CARDS[u.id].texto!=='Sem efeito.'?'<span class="ufx">✦</span>':'')+
      '</div>';
    }).join('');
    return '<div class="lane"><div class="lane-head"><span>'+p.nome+'</span><span class="lane-pow">'+somaPoder(pi,slot)+' ⚔</span></div>'+
      (chips+extra || '<div class="lane-empty">— vazio —</div>')+'</div>';
  };
  let banner = '';
  if(res) banner = res.vencedor>=0
    ? '<div class="win-banner">🏆 '+state.players[res.vencedor].nome+' ('+res.poder[0]+' x '+res.poder[1]+')</div>'
    : '<div class="win-banner">Empate ('+res.poder[0]+' x '+res.poder[1]+')</div>';
  const trava = state.lockAte[slot]>=state.turno ? '<div class="win-banner">❄ Movimentos travados</div>' : '';
  return '<div class="slot slot-'+area+(res?' resolved-slot':'')+'">'+
    lane(top)+
    '<div class="loccard'+(clicavel?' placeable':'')+(res?' resolved':'')+'"'+(clicavel?' onclick="clicarSlot('+slot+')"':'')+'>'+
      '<div class="licon">'+l.icon+'</div>'+
      '<div class="lname">'+(slot===2?'⚡ ESTAGIO FINAL: ':'')+l.nome+'</div>'+
      '<div class="lfx">'+l.fx+'</div>'+
      '<div class="lscore">'+somaPoder(top,slot)+' × '+somaPoder(bottom,slot)+'</div>'+
      (clicavel?'<div class="win-banner">Clique para escolher este local</div>':'')+
      trava+banner+
    '</div>'+
    lane(bottom)+
  '</div>';
}

function renderOverlay(){
  if(state.gameOver){
    const pl = placarLocais();
    return '<div class="overlay"><div class="overlay-card"><h2>Fim de jogo</h2><p>'+state.gameOver+'</p>'+
      '<p>Placar: '+state.players[0].nome+' '+pl[0]+' × '+pl[1]+' '+state.players[1].nome+'</p>'+
      '<button onclick="resetar()">Novo teste</button></div></div>';
  }
  if(state.passPending){
    return '<div class="overlay"><div class="overlay-card"><h2>Passe o dispositivo 📱</h2>'+
      '<p>Agora e a vez de <b>'+state.players[state.vezLocal].nome+'</b> jogar em segredo.</p>'+
      '<button onclick="confirmarPasse()">Sou eu, continuar</button></div></div>';
  }
  return '';
}

function renderSetup(){
  $('#app').innerHTML =
    '<div class="setup">'+
      '<h1>Age of Guthology</h1>'+
      '<p>Jogadas simultaneas, revelacao dupla, 6 deuses com starter decks proprios.</p>'+
      '<div class="setup-grid">'+
        '<div class="setup-card"><h2>Jogadores</h2>'+
          mythSelect('Jogador 1','p1Mythic','thor')+
          mythSelect('Jogador 2','p2Mythic','athena')+
          '<label style="color:#cbd8e5;font-size:13px">Esconder maos no modo local (passar o dispositivo)?<br>'+
          '<select id="hideHands"><option value="nao">Nao, modo bancada (ve tudo)</option><option value="sim">Sim, maos e jogadas privadas</option></select></label>'+
          '<div class="phase-controls"><button onclick="iniciarJogo()">Iniciar partida local</button></div>'+
        '</div>'+
        '<div class="setup-card"><h2>Online por codigo</h2>'+
          '<p class="small-note">Quem cria a sala e o <b>Jogador 1</b>. Cada um ve so a propria mao e as proprias jogadas ate a revelacao.</p>'+
          '<div class="phase-controls"><button onclick="criarSala()">Criar sala online</button></div>'+
          '<div class="online-row"><input id="inpCodigo" maxlength="5" placeholder="CODIGO" oninput="this.value=this.value.toUpperCase()"><button onclick="entrarSala()">Entrar</button></div>'+
          '<div id="statusLobby">'+lobbyStatus+'</div>'+
        '</div>'+
        '<div class="rules-card"><h2>Regras desta versao</h2><ul>'+
          '<li><b>Simultaneo:</b> os dois jogam em segredo. Quando ambos apertam Encerrar, tudo revela — quem revela primeiro alterna por turno.</li>'+
          '<li>2 Locais resolvem no fim do turno '+TURNO_RESOLVE+' (maior poder leva; 2x0 encerra). O <b>Estagio Final</b> revela no inicio do turno '+TURNO_RESOLVE+' — da para semear cedo — e e o unico campo nos turnos 4-'+TURNO_FINAL+'.</li>'+
          '<li>Turno N da +N de mana; o que sobra <b>acumula</b>.</li>'+
          '<li>Cada deus tem <b>passiva</b> e <b>ativa (1x por partida)</b> — sempre visiveis no painel.</li>'+
          '<li>Decks de 12 cartas unicas por deus. Cartas nao morrem: poder x custo x efeito.</li>'+
        '</ul><div class="small-note">Starter decks v1 — balance em teste. Artes depois.</div></div>'+
      '</div>'+
    '</div>';
}

function mythSelect(label,id,chosen){
  const nameId = id==='p1Mythic' ? 'p1Name' : 'p2Name';
  return '<div class="myth-row">'+
    '<div class="myth-portrait" id="'+id+'Img" style="background-image:url('+MYTHICS[chosen].img+')"></div>'+
    '<div class="myth-fields">'+
      '<label>'+label+'<input id="'+nameId+'" maxlength="18" placeholder="Nick" value="'+label+'"></label>'+
      '<label>Deus<select id="'+id+'" onchange="atualizarSetup(\''+id+'\')">'+
        Object.entries(MYTHICS).map(([k,m])=>'<option value="'+k+'" '+(k===chosen?'selected':'')+'>'+m.nome+'</option>').join('')+
      '</select></label>'+
      '<div class="kit-preview" id="'+id+'Kit">'+kitTexto(chosen)+'</div>'+
    '</div>'+
  '</div>';
}
function kitTexto(deus){
  const m = MYTHICS[deus];
  return '🛡 <b>Passiva:</b> '+m.passiva+'<br>⚡ <b>Ativa:</b> '+m.ativa;
}
function atualizarSetup(id){
  const sel2 = document.getElementById(id);
  const img = document.getElementById(id+'Img');
  const kit = document.getElementById(id+'Kit');
  if(sel2 && img) img.style.backgroundImage = 'url('+MYTHICS[sel2.value].img+')';
  if(sel2 && kit) kit.innerHTML = kitTexto(sel2.value);
}

render();
</script>
</body>
</html>
