<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Age of Guthology</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
:root{
  --bg:#080b12; --panel:#101722; --panel2:#151e2b; --line:#304155;
  --text:#eef3f8; --muted:#9cadbd; --gold:#e7c979; --gold2:#a87b2d;
  --red:#d86363; --blue:#5ea8ff; --green:#7bd38d; --mana:#8fd0ff;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0; color:var(--text); font-family:Segoe UI,Arial,sans-serif;
  background:
    radial-gradient(circle at 50% -10%,rgba(169,128,65,.25),transparent 36%),
    radial-gradient(circle at 0 30%,rgba(91,76,164,.18),transparent 32%),
    linear-gradient(180deg,#05070d,#0a0f18 45%,#05070d);
}
button,select,input{font:inherit}
button{
  border:1px solid #466078; background:#101b2a; color:#f6efe0; border-radius:8px;
  padding:8px 12px; cursor:pointer; font-weight:700;
}
button:hover{border-color:var(--gold); color:#fff}
button:disabled{opacity:.45; cursor:not-allowed}
select,input{background:#08111d; color:var(--text); border:1px solid var(--line); border-radius:7px; padding:8px; width:100%; min-width:0}

/* ===== Setup ===== */
.setup{max-width:1000px; margin:20px auto; padding:0 14px}
.setup h1{font-family:Georgia,serif; font-size:clamp(30px,6vw,46px); margin:0 0 6px; color:var(--gold); letter-spacing:3px}
.setup p{color:var(--muted); margin:0 0 16px}
.setup-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px}
@media(max-width:820px){ .setup-grid{grid-template-columns:1fr} }
.setup-card,.rules-card{border:1px solid var(--line); background:rgba(16,23,34,.86); border-radius:10px; padding:14px}
.setup-card h2,.rules-card h2{margin:0 0 10px; color:#fff; font-size:19px}
.myth-row{display:grid; grid-template-columns:92px 1fr; gap:10px; align-items:center; margin:10px 0}
.myth-portrait{width:92px; height:92px; border-radius:8px; border:1px solid #46576c; background:#172030 center/cover no-repeat}
.myth-fields{display:grid; gap:6px}
.myth-fields label{display:grid; gap:3px; color:#cbd8e5; font-size:13px}
.rules-card ul{margin:8px 0 0; padding-left:18px; color:#cdd8e5; line-height:1.5; font-size:14px}
.online-row{display:grid; grid-template-columns:1fr auto; gap:8px; margin-top:10px}
#statusLobby{margin-top:10px; color:#cbd8e5; min-height:20px; line-height:1.4}
#statusLobby .codigo{display:block; margin:6px 0; color:var(--gold); font-size:30px; letter-spacing:8px; font-weight:900}
.small-note{color:var(--muted); font-size:12px; margin-top:8px}
.phase-controls{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}

/* ===== Mesa ===== */
.table{max-width:1240px; margin:0 auto; padding:6px 8px 14px; display:flex; flex-direction:column; gap:8px; min-height:100vh}
.topbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.brand{font-family:Georgia,serif; color:var(--gold); letter-spacing:2px; font-size:18px; font-weight:800}
.pill{border:1px solid var(--line); background:#0b1320; border-radius:999px; padding:4px 10px; color:var(--muted); font-size:13px; white-space:nowrap}
.pill b{color:var(--text)}
.pill.gold b{color:var(--gold)}
.grow{flex:1}

.pstrip{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  border:1px solid var(--line); border-radius:10px; background:rgba(16,23,34,.88); padding:8px 10px;
}
.pstrip.acting{border-color:var(--gold); box-shadow:0 0 0 1px rgba(231,201,121,.35),0 0 18px rgba(231,201,121,.12)}
.pstrip .avatar{width:46px; height:46px; border-radius:8px; border:1px solid #46576c; background:#1a2432 center/cover no-repeat; flex:0 0 auto}
.pstrip .pname{font-weight:900; font-size:15px}
.pstrip .god{color:var(--muted); font-size:12px}
.stat{padding:3px 8px; border:1px solid var(--line); border-radius:999px; font-size:13px; background:#07101c; white-space:nowrap}
.stat.mana{color:var(--mana)}
.stat.win{color:#ffe3a0; border-color:#8a6e35}
.god-actions{display:flex; gap:6px; flex-wrap:wrap; margin-left:auto}
.god-actions button{font-size:12px; padding:6px 9px}

/* Mao horizontal */
.hand-row{
  display:flex; gap:8px; overflow-x:auto; overflow-y:visible; padding:10px 4px 6px; min-height:130px; align-items:stretch;
}
.hand-row.oculta{min-height:64px; align-items:center}
.hcard{
  flex:0 0 108px; min-height:118px; border:1px solid #45586f; border-radius:9px; padding:7px;
  background:linear-gradient(180deg,#1b2533,#0d131d); position:relative; cursor:pointer;
  display:flex; flex-direction:column; gap:3px; transition:transform .1s, box-shadow .15s;
}
.hcard:hover{transform:translateY(-3px)}
.hcard.unit{border-color:#526b8d}
.hcard.spell{border-color:#695490}
.hcard.dead{opacity:.45; cursor:not-allowed}
.hcard.dead:hover{transform:none}
.hcard.selected{border-color:var(--gold); box-shadow:0 0 0 2px rgba(231,201,121,.55),0 0 20px rgba(231,201,121,.2); transform:translateY(-4px)}
.hcard .cost{
  position:absolute; top:-7px; left:-7px; width:24px; height:24px; border-radius:50%;
  background:#08111d; border:1px solid var(--gold2); display:flex; align-items:center; justify-content:center;
  color:var(--gold); font-weight:900; font-size:13px;
}
.hcard h4{margin:4px 0 0 14px; font-size:12px; line-height:1.1; min-height:26px}
.hcard .pow{font-size:20px; font-weight:900; color:#cfe3ff; text-align:center}
.hcard .pow span{font-size:11px; color:var(--muted); font-weight:400}
.hcard .fx{font-size:10px; color:#c9d5df; line-height:1.25; overflow:hidden}
.cardback{
  flex:0 0 40px; height:56px; border-radius:6px; border:1px solid #46576c;
  background:repeating-linear-gradient(135deg,#152033,#152033 4px,#0d1524 4px,#0d1524 8px);
}
.hidden-note{color:var(--muted); font-size:12px; padding:6px 8px; border:1px dashed #40546a; border-radius:8px}

/* Board: L C R */
.board{
  display:grid; grid-template-areas:'L C R'; grid-template-columns:1fr 1fr 1fr; gap:10px; align-items:stretch; flex:1;
}
@media(max-width:880px){
  .board{grid-template-areas:'L R' 'C C'; grid-template-columns:1fr 1fr}
}
.slot{display:flex; flex-direction:column; gap:6px; min-height:300px}
.slot-L{grid-area:L}.slot-C{grid-area:C}.slot-R{grid-area:R}
.lane{
  flex:1; border:1px solid var(--line); border-radius:9px; background:rgba(10,16,26,.7); padding:6px;
  display:flex; flex-direction:column; gap:5px; min-height:88px;
}
.lane-head{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; display:flex; justify-content:space-between}
.lane-pow{font-weight:900; color:#cfe3ff}
.uchip{
  border:1px solid #36495e; border-radius:7px; background:#0b1320; padding:5px 7px;
  display:flex; align-items:center; gap:7px; font-size:12px;
}
.uchip .upow{font-weight:900; font-size:14px; color:#cfe3ff; min-width:20px; text-align:center}
.uchip .uname{flex:1; line-height:1.15}
.uchip .ufx{font-size:9px; color:var(--muted)}
.uchip.movable{border-color:var(--blue); cursor:pointer}
.uchip.selected-move{border-color:var(--gold); box-shadow:0 0 0 2px rgba(231,201,121,.5)}
.lane-empty{color:#41546a; font-size:11px; text-align:center; padding:10px 0}
.loccard{
  border:1px solid #8a6e35; border-radius:9px; padding:8px; text-align:center;
  background:
    radial-gradient(circle at 50% 15%,rgba(255,216,126,.22),transparent 55%),
    linear-gradient(180deg,#241d10,#141a24);
}
.loccard .licon{font-size:26px; line-height:1.1}
.loccard .lname{font-weight:900; color:var(--gold); font-family:Georgia,serif; margin:2px 0; font-size:14px}
.loccard .lfx{font-size:11px; color:#d8c9a3; line-height:1.3; min-height:28px}
.loccard .lscore{margin-top:5px; font-size:13px; font-weight:900; color:#cfe3ff}
.loccard.placeable{border-color:var(--gold); cursor:pointer; box-shadow:0 0 0 2px rgba(231,201,121,.5),0 0 22px rgba(231,201,121,.2)}
.loccard.placeable:hover{filter:brightness(1.18)}
.loccard.resolved{opacity:.9; border-style:dashed}
.win-banner{
  margin-top:5px; font-size:12px; font-weight:900; color:#ffe6a6;
  border:1px solid rgba(231,201,121,.6); border-radius:7px; padding:4px 6px; background:rgba(104,76,22,.3);
}
.slot.resolved-slot .lane{opacity:.55}
.statuscard{
  border:1px dashed #40546a; border-radius:9px; padding:12px; text-align:center; color:#cbd8e5;
  background:rgba(8,17,29,.6); margin:auto 0; font-size:13px; line-height:1.6;
}
.statuscard b{color:var(--gold)}
.turn-order{font-size:12px; color:var(--muted); margin-top:6px}

/* Log */
.logwrap{border:1px solid var(--line); border-radius:10px; background:rgba(6,10,16,.88)}
.logwrap summary{padding:8px 12px; cursor:pointer; color:var(--gold); font-weight:700; font-size:13px}
.log{max-height:150px; overflow:auto; padding:0 12px 10px; color:#cbd8e5; font-size:12px; line-height:1.4}
.log div{border-bottom:1px solid rgba(255,255,255,.06); padding:4px 0}

/* Overlays */
.overlay{position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.78); display:flex; align-items:center; justify-content:center; padding:20px}
.overlay-card{max-width:460px; width:100%; border:1px solid var(--gold2); background:#111926; border-radius:12px; padding:22px; text-align:center}
.overlay-card h2{font-family:Georgia,serif; color:var(--gold); font-size:28px; margin:0 0 10px}
.overlay-card p{color:#cbd8e5; line-height:1.5}
</style>
</head>
<body>
<div id="app"></div>
<script>
const $ = s => document.querySelector(s);

/* ==================== DEUSES ====================
   Sem vida, sem devocao, sem combate: os kits mexem em Poder, mana e compra. */
const MYTHICS = {
  ares:{
    nome:'Ares, Sangue da Guerra', img:'rift-assets/cards/volgar-o-tempestario.webp',
    passiva:'Suas unidades de custo 4 ou mais entram com +1 Poder.',
    ativo:'2 de mana, 1x por turno: sua maior unidade ganha +2 Poder.',
    custoAtivo:2
  },
  athena:{
    nome:'Atena, Olhos da Estrategia', img:'rift-assets/cards/athena-olhos-da-estrategia.webp',
    passiva:'Nos turnos em que voce joga por segundo, compre 1 carta.',
    ativo:'1 de mana, 1x por turno: mova uma das suas unidades para outro Local.',
    custoAtivo:1
  },
  odin:{
    nome:'Odin, Senhor dos Pressagios', img:'rift-assets/cards/bjorn-rei-do-inverno.webp',
    passiva:'A primeira carta que voce joga em cada turno custa 1 a menos.',
    ativo:'2 de mana, 1x por turno: compre 1 carta.',
    custoAtivo:2
  },
  thor:{
    nome:'Thor, Senhor do Trovao', img:'rift-assets/cards/thor-senhor-do-trovao.webp',
    passiva:'Seu deck ganha 1 Mjolnir: custo 0, Poder 2.',
    ativo:'Teste interno: se seu nick for Guto, voce ganha o jogo automaticamente.',
    custoAtivo:0
  },
  anubis:{
    nome:'Anubis, Juiz dos Mortos', img:'rift-assets/cards/anubis-juiz-dos-mortos.webp',
    passiva:'Suas unidades no Estagio Final ganham +1 Poder.',
    ativo:'1x por turno: sacrifique sua menor unidade e ganhe 2 de mana.',
    custoAtivo:0
  }
};

/* ==================== CARTAS ====================
   So custo + Poder + efeito. Nada de influencia. Cartas nao morrem:
   sao investimento de mana convertido em Poder e efeitos. */
const CARDS = {
  hoplita:    {nome:'Hoplita Jurado',       tipo:'unit', custo:1, poder:2, texto:''},
  guerreiro:  {nome:'Guerreiro de Bronze',  tipo:'unit', custo:2, poder:3, texto:''},
  oraculo:    {nome:'Oraculo da Colina',    tipo:'unit', custo:2, poder:1, texto:'Ao entrar: compre 1 carta.'},
  sacerdotisa:{nome:'Sacerdotisa do Voto',  tipo:'unit', custo:3, poder:2, texto:'Ao entrar: ganhe 1 de mana.'},
  navio:      {nome:'Navio Votivo',         tipo:'unit', custo:3, poder:3, tags:['navio'], texto:'Navio: adora o Porto de Poseidon.'},
  guarda:     {nome:'Guarda do Santuario',  tipo:'unit', custo:3, poder:4, texto:''},
  falange:    {nome:'Falange Sagrada',      tipo:'unit', custo:4, poder:5, texto:''},
  musa:       {nome:'Musa Inspiradora',     tipo:'unit', custo:4, poder:2, texto:'Ao entrar: suas outras unidades neste Local ganham +1 Poder.'},
  campeao:    {nome:'Campeao Mortal',       tipo:'unit', custo:5, poder:7, texto:''},
  titanete:   {nome:'Filho de Tita',        tipo:'unit', custo:6, poder:9, texto:'Feito para o Estagio Final.'},
  mjolnir:    {nome:'Mjolnir Arremessado',  tipo:'unit', custo:0, poder:2, tags:['martelo'], texto:'O martelo de Thor. Unico.'},

  pressagio:  {nome:'Pressagio',            tipo:'spell', custo:1, texto:'Compre 2 cartas.'},
  lanca:      {nome:'Lanca Divina',         tipo:'spell', custo:2, texto:'Sua maior unidade ganha +2 Poder.'},
  nevoa:      {nome:'Nevoa Sagrada',        tipo:'spell', custo:2, texto:'A maior unidade inimiga perde 2 Poder.'},
  hino:       {nome:'Hino de Devocao',      tipo:'spell', custo:2, texto:'Ganhe 3 de mana.'},
  inspiracao: {nome:'Inspiracao Divina',    tipo:'spell', custo:3, texto:'Suas unidades no Local onde voce tem mais unidades ganham +1 Poder.'}
};

const DECK_BASE = [
  'hoplita','hoplita','hoplita','guerreiro','guerreiro','guerreiro',
  'oraculo','oraculo','sacerdotisa','sacerdotisa','navio','navio','guarda','guarda',
  'falange','falange','musa','musa','campeao','campeao','titanete',
  'pressagio','pressagio','lanca','lanca','nevoa','nevoa','hino','inspiracao','inspiracao'
];

function deckForMythic(mythic){
  const d = DECK_BASE.slice();
  if(mythic==='thor') d.push('mjolnir'); // 1 unico martelo, custo 0
  return d;
}

/* ==================== LOCAIS ==================== */
const LOCATIONS = {
  arena:{nome:'Arena de Ares', icon:'⚔', fx:'Unidades aqui ganham +1 Poder.'},
  templo:{nome:'Templo de Atena', icon:'🦉', fx:'O lado com MENOS unidades aqui ganha +2 Poder em cada uma.'},
  delfos:{nome:'Oraculo de Delfos', icon:'✦', fx:'Ao baixar uma unidade aqui, compre 1 carta.'},
  porto:{nome:'Porto de Poseidon', icon:'≈', fx:'Navios aqui ganham +3 Poder.'},
  necropole:{nome:'Necropole de Anubis', icon:'☥', fx:'Unidades aqui perdem 1 Poder.'},
  olimpo:{nome:'Monte Olimpo', icon:'▲', fx:'Baixar unidades aqui custa +1 de mana.'},
  forja:{nome:'Forja dos Ciclopes', icon:'◆', fx:'Unidades baixadas aqui ganham +1 Poder permanente.'},
  labirinto:{nome:'Labirinto de Creta', icon:'◇', fx:'Efeitos "ao entrar" de unidades nao ativam aqui.'}
};
const LOCATION_IDS = Object.keys(LOCATIONS);
const TURNO_FINAL = 6;   // ultimo turno do Estagio Final
const TURNO_RESOLVE = 3; // turno em que os 2 Locais iniciais resolvem
const CAP_LOCAL = 4;     // maximo de unidades por jogador em cada Local

/* ==================== ESTADO ==================== */
let state = null;
let uidSeq = 1;
let mode = 'local';
let myIndex = null;
let peer = null, conn = null, conns = [];
let lobbyStatus = '';
let pendingPlay = null;     // idx da carta da mao aguardando escolha de Local
let pendingMoveUid = null;  // unidade aguardando Local de destino (ativo da Atena)

function online(){ return mode==='host' || mode==='guest'; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function cleanNick(v,f){ const n=String(v||'').replace(/[<>&"']/g,'').trim().slice(0,18); return n||f; }
function nickIsGuto(v){ return String(v||'').trim().toLowerCase()==='guto'; }
function log(m){ state.log.unshift(m); state.log = state.log.slice(0,160); }

function novoPlayer(nome, mythic){
  const p = { nome, mythic, mana:0, deck:shuffle(deckForMythic(mythic)), mao:[], descarte:[],
    unidades:[], activeUsed:false, firstCardPlayed:false, moveCredit:0 };
  draw(p,4);
  return p;
}

function draw(p,n=1){
  for(let k=0;k<n;k++) if(p.deck.length) p.mao.push(p.deck.pop());
}

function criarEstado(m1, m2, nome1, nome2, hideHands){
  uidSeq = 1;
  const locDeck = shuffle(LOCATION_IDS.slice());
  const st = {
    turno:0, ordem:0, ativo:0, jogadas:{0:false,1:false},
    locais:[locDeck.shift(), locDeck.shift(), null], // [esquerda, direita, estagio final]
    locDeck, resolvidos:[null,null,null],
    players:[novoPlayer(nome1,m1), novoPlayer(nome2,m2)],
    log:[], gameOver:null, passPending:false, hideHands:!!hideHands
  };
  return st;
}

function iniciarJogo(){
  fecharRede();
  mode = 'local'; myIndex = null;
  state = criarEstado(
    $('#p1Mythic').value, $('#p2Mythic').value,
    cleanNick($('#p1Name').value,'Jogador 1'), cleanNick($('#p2Name').value,'Jogador 2'),
    $('#hideHands').value==='sim'
  );
  log('Partida iniciada! Dois Locais em disputa ate o turno '+TURNO_RESOLVE+'. Vence quem levar 2 Locais.');
  iniciarTurno(1);
  render();
}

/* ==================== TURNOS ====================
   Turno N: os dois ganham +N de mana (o que sobrar ACUMULA).
   Turnos impares: J1 joga primeiro. Pares: J2 primeiro.
   Cada um joga quantas cartas quiser e confirma. */
function iniciarTurno(n){
  state.turno = n;
  state.ordem = (n%2===1) ? 0 : 1;
  state.ativo = state.ordem;
  state.jogadas = {0:false,1:false};
  for(const p of state.players){
    p.mana += n; // acumulativa
    p.activeUsed = false;
    p.firstCardPlayed = false;
    p.moveCredit = 0;
    draw(p,1);
  }
  const segundo = state.players[1-state.ordem];
  if(segundo.mythic==='athena'){
    draw(segundo,1);
    log('Passiva de Atena: '+segundo.nome+' joga por segundo e comprou 1 carta extra.');
  }
  log('— Turno '+n+' (+'+n+' de mana). '+state.players[state.ordem].nome+' joga primeiro.');
}

function canAct(pi){
  if(!state || state.gameOver || state.passPending) return false;
  if(state.ativo!==pi) return false;
  if(online()) return pi===myIndex;
  return true;
}

function encerrarJogadas(pi){
  if(!canAct(pi)) return;
  pendingPlay = null; pendingMoveUid = null;
  state.jogadas[pi] = true;
  log(state.players[pi].nome+' encerrou as jogadas.');
  const outro = 1-pi;
  if(!state.jogadas[outro]){
    state.ativo = outro;
    if(mode==='local' && state.hideHands) state.passPending = true;
  }else{
    fimDoTurno();
  }
  sincronizar();
}

function fimDoTurno(){
  if(state.turno===TURNO_RESOLVE){
    resolverLocal(0);
    resolverLocal(1);
    const placar = placarLocais();
    if(placar[0]>=2 || placar[1]>=2){
      decidirVencedor();
      return;
    }
    state.locais[2] = state.locDeck.shift();
    log('⚡ O ESTAGIO FINAL surge: '+LOCATIONS[state.locais[2]].nome+'! Turnos 4 a '+TURNO_FINAL+', tudo num Local so.');
    iniciarTurno(state.turno+1);
    return;
  }
  if(state.turno>=TURNO_FINAL){
    resolverLocal(2);
    decidirVencedor();
    return;
  }
  iniciarTurno(state.turno+1);
}

function somaPoder(pi, slot){
  return state.players[pi].unidades.filter(u=>u.loc===slot).reduce((s,u)=>s+poderUnidade(u,pi),0);
}

function resolverLocal(slot){
  if(!state.locais[slot] || state.resolvidos[slot]) return;
  const pw = [somaPoder(0,slot), somaPoder(1,slot)];
  let v = -1;
  if(pw[0]>pw[1]) v = 0; else if(pw[1]>pw[0]) v = 1;
  state.resolvidos[slot] = {vencedor:v, poder:pw};
  const l = LOCATIONS[state.locais[slot]];
  if(v>=0) log('🏛 '+l.nome+' resolvido: '+pw[0]+' x '+pw[1]+'. '+state.players[v].nome+' conquistou o Local!');
  else log('🏛 '+l.nome+' resolvido: '+pw[0]+' x '+pw[1]+'. Empate — ninguem leva.');
}

function placarLocais(){
  const c = [0,0];
  for(const r of state.resolvidos) if(r && r.vencedor>=0) c[r.vencedor]++;
  return c;
}

function decidirVencedor(){
  const placar = placarLocais();
  if(placar[0]!==placar[1]){
    const w = placar[0]>placar[1] ? 0 : 1;
    state.gameOver = state.players[w].nome+' venceu por '+placar[w]+' Local(is) a '+placar[1-w]+'!';
  }else{
    // desempate: Poder total somado nos Locais resolvidos
    let t0=0, t1=0;
    for(const r of state.resolvidos) if(r){ t0+=r.poder[0]; t1+=r.poder[1]; }
    if(t0!==t1){
      const w = t0>t1 ? 0 : 1;
      state.gameOver = 'Empate em Locais ('+placar[0]+' x '+placar[1]+'). '+state.players[w].nome+' venceu no desempate por Poder total ('+t0+' x '+t1+').';
    }else{
      state.gameOver = 'Empate epico! Os deuses recusam o veredito ('+t0+' x '+t1+' de Poder total).';
    }
  }
  log('🏆 '+state.gameOver);
}

/* ==================== PODER ==================== */
function poderUnidade(u, pi){
  let v = u.poder + (u.tempP||0);
  const lid = state.locais[u.loc];
  if(lid==='arena') v += 1;
  if(lid==='necropole') v -= 1;
  if(lid==='porto' && (u.tags||[]).includes('navio')) v += 3;
  if(lid==='templo'){
    const minhas = state.players[pi].unidades.filter(x=>x.loc===u.loc).length;
    const deles = state.players[1-pi].unidades.filter(x=>x.loc===u.loc).length;
    if(minhas<deles) v += 2;
  }
  if(u.loc===2 && state.players[pi].mythic==='anubis') v += 1; // Anubis rege o Estagio Final
  return Math.max(0,v);
}

/* ==================== JOGAR CARTAS ==================== */
function custoCarta(pi,id){
  let c = CARDS[id].custo;
  if(!state.players[pi].firstCardPlayed && state.players[pi].mythic==='odin') c -= 1;
  return Math.max(0,c);
}

function slotAberto(slot){
  return state.locais[slot] && !state.resolvidos[slot];
}

function selecionarCarta(pi, idx){
  if(!canAct(pi)) return;
  const id = state.players[pi].mao[idx], c = CARDS[id];
  if(!c) return;
  pendingMoveUid = null;
  if(c.tipo==='spell'){ castSpell(pi, idx); return; }
  if(state.players[pi].mana < custoCarta(pi,id)){ log('Mana insuficiente para '+c.nome+'.'); render(); return; }
  pendingPlay = (pendingPlay===idx) ? null : idx;
  render();
}

function clicarSlot(slot){
  if(pendingPlay!==null){ playUnitAt(state.ativo, pendingPlay, slot); return; }
  if(pendingMoveUid!==null){ moverUnidade(state.ativo, pendingMoveUid, slot); return; }
}

function playUnitAt(pi, idx, slot){
  if(!canAct(pi) || !slotAberto(slot)) return;
  const p = state.players[pi];
  const id = p.mao[idx], c = CARDS[id];
  if(!c || c.tipo!=='unit') return;
  if(p.unidades.filter(u=>u.loc===slot).length>=CAP_LOCAL){ log('Limite de '+CAP_LOCAL+' unidades neste Local.'); render(); return; }
  const lid = state.locais[slot];
  let custo = custoCarta(pi,id);
  if(lid==='olimpo') custo += 1;
  if(p.mana<custo){ log('Mana insuficiente para baixar em '+LOCATIONS[lid].nome+' (custo '+custo+').'); render(); return; }
  p.mana -= custo;
  p.firstCardPlayed = true;
  p.mao.splice(idx,1);
  const u = {uid:uidSeq++, id, nome:c.nome, poder:c.poder, tempP:0, loc:slot, tags:c.tags||[]};
  if(lid==='forja') u.tempP += 1;
  if(p.mythic==='ares' && c.custo>=4){ u.tempP += 1; log('Passiva de Ares: '+c.nome+' entrou com +1 Poder.'); }
  p.unidades.push(u);
  log(p.nome+' baixou '+c.nome+' em '+LOCATIONS[lid].nome+' (custo '+custo+').');
  // Efeitos "ao entrar" — o Labirinto silencia efeitos de unidade
  if(lid!=='labirinto'){
    if(id==='oraculo'){ draw(p,1); log('Oraculo: '+p.nome+' comprou 1 carta.'); }
    if(id==='sacerdotisa'){ p.mana += 1; log('Sacerdotisa: '+p.nome+' ganhou 1 de mana.'); }
    if(id==='musa'){
      const outras = p.unidades.filter(x=>x.loc===slot && x.uid!==u.uid);
      outras.forEach(x=>x.tempP += 1);
      if(outras.length) log('Musa: +1 Poder em '+outras.length+' unidade(s) do Local.');
    }
  }else if(['oraculo','sacerdotisa','musa'].includes(id)){
    log('Labirinto de Creta silenciou o efeito de '+c.nome+'.');
  }
  if(lid==='delfos'){ draw(p,1); log('Delfos: '+p.nome+' comprou 1 carta.'); }
  pendingPlay = null;
  sincronizar();
}

function castSpell(pi, idx){
  if(!canAct(pi)) return;
  const p = state.players[pi], o = state.players[1-pi];
  const id = p.mao[idx], c = CARDS[id];
  if(!c || c.tipo!=='spell') return;
  const custo = custoCarta(pi,id);
  if(p.mana<custo){ log('Mana insuficiente para '+c.nome+'.'); render(); return; }
  p.mana -= custo;
  p.firstCardPlayed = true;
  p.mao.splice(idx,1);
  p.descarte.push(id);
  if(id==='pressagio'){ draw(p,2); log(p.nome+' usou Pressagio: comprou 2 cartas.'); }
  if(id==='hino'){ p.mana += 3; log(p.nome+' cantou o Hino: +3 de mana.'); }
  if(id==='lanca'){
    const u = p.unidades.slice().sort((a,b)=>poderUnidade(b,pi)-poderUnidade(a,pi))[0];
    if(u){ u.tempP += 2; log('Lanca Divina: '+u.nome+' ganhou +2 Poder.'); }
    else log(p.nome+' usou Lanca Divina sem unidade em campo.');
  }
  if(id==='nevoa'){
    const u = o.unidades.slice().sort((a,b)=>poderUnidade(b,1-pi)-poderUnidade(a,1-pi))[0];
    if(u){ u.tempP -= 2; log('Nevoa Sagrada: '+u.nome+' perdeu 2 Poder.'); }
    else log(p.nome+' usou Nevoa Sagrada sem alvo inimigo.');
  }
  if(id==='inspiracao'){
    let melhor = -1, qtd = -1;
    for(const s of [0,1,2]){
      if(!slotAberto(s)) continue;
      const n = p.unidades.filter(u=>u.loc===s).length;
      if(n>qtd){ qtd = n; melhor = s; }
    }
    if(melhor>=0 && qtd>0){
      p.unidades.filter(u=>u.loc===melhor).forEach(u=>u.tempP += 1);
      log('Inspiracao Divina: +1 Poder em '+qtd+' unidade(s) em '+LOCATIONS[state.locais[melhor]].nome+'.');
    }else log(p.nome+' usou Inspiracao Divina sem unidades em Locais abertos.');
  }
  sincronizar();
}

/* ==================== ATIVOS DOS DEUSES ==================== */
function usarAtivo(pi){
  if(!canAct(pi)) return;
  const p = state.players[pi], m = MYTHICS[p.mythic];
  if(p.activeUsed) return;
  if(p.mana < m.custoAtivo){ log('Mana insuficiente para o ativo de '+m.nome+'.'); render(); return; }
  if(p.mythic==='ares'){
    const u = p.unidades.slice().sort((a,b)=>poderUnidade(b,pi)-poderUnidade(a,pi))[0];
    if(!u){ log('Ares nao encontrou unidade para abencoar.'); render(); return; }
    p.mana -= m.custoAtivo; p.activeUsed = true;
    u.tempP += 2;
    log(p.nome+' invocou Ares: '+u.nome+' ganhou +2 Poder.');
  }
  if(p.mythic==='athena'){
    if(!p.unidades.length){ log('Atena nao tem unidades para mover.'); render(); return; }
    p.mana -= m.custoAtivo; p.activeUsed = true;
    p.moveCredit = 1;
    log(p.nome+' invocou Atena: escolha uma unidade sua e o Local de destino.');
  }
  if(p.mythic==='odin'){
    p.mana -= m.custoAtivo; p.activeUsed = true;
    draw(p,1);
    log(p.nome+' invocou Odin e comprou 1 carta.');
  }
  if(p.mythic==='thor'){
    p.activeUsed = true;
    if(nickIsGuto(p.nome)){
      state.gameOver = p.nome+' ativou Thor e venceu automaticamente pelo nick Guto.';
      log(p.nome+' arremessou o martelo da zoeira: nick Guto detectado, vitoria automatica.');
    }else{
      log(p.nome+' tentou ativar Thor, mas o nick nao era Guto.');
    }
  }
  if(p.mythic==='anubis'){
    const u = p.unidades.slice().sort((a,b)=>poderUnidade(a,pi)-poderUnidade(b,pi))[0];
    if(!u){ log('Anubis nao tem unidade para julgar.'); render(); return; }
    p.activeUsed = true;
    p.unidades = p.unidades.filter(x=>x.uid!==u.uid);
    p.descarte.push(u.id);
    p.mana += 2;
    log(p.nome+' invocou Anubis: sacrificou '+u.nome+' e ganhou 2 de mana.');
  }
  sincronizar();
}

function clicarUnidade(pi, uid){
  if(!canAct(pi)) return;
  const p = state.players[pi];
  if(p.moveCredit<=0) return;
  const u = p.unidades.find(x=>x.uid===uid);
  if(!u || !slotAberto(u.loc)) return;
  pendingPlay = null;
  pendingMoveUid = (pendingMoveUid===uid) ? null : uid;
  render();
}

function moverUnidade(pi, uid, slot){
  if(!canAct(pi) || !slotAberto(slot)) return;
  const p = state.players[pi];
  if(p.moveCredit<=0) return;
  const u = p.unidades.find(x=>x.uid===uid);
  if(!u || u.loc===slot) return;
  if(p.unidades.filter(x=>x.loc===slot).length>=CAP_LOCAL){ log('Limite de '+CAP_LOCAL+' unidades no destino.'); render(); return; }
  u.loc = slot;
  p.moveCredit -= 1;
  log('Atena guiou '+u.nome+' para '+LOCATIONS[state.locais[slot]].nome+'.');
  pendingMoveUid = null;
  sincronizar();
}

function confirmarPasse(){
  state.passPending = false;
  render();
}

/* ==================== REDE ==================== */
function gerarCodigo(){
  const A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s='';
  for(let i=0;i<5;i++) s += A[Math.floor(Math.random()*A.length)];
  return s;
}
function statusLobby(html){ lobbyStatus = html; const el = $('#statusLobby'); if(el) el.innerHTML = html; }
function temPeerJS(){
  if(typeof Peer==='undefined'){ statusLobby('Nao foi possivel carregar o modo online. Confira a internet.'); return false; }
  return true;
}
function fecharRede(){
  try{ if(conn) conn.close(); }catch(e){}
  try{ for(const c of conns) c.close(); }catch(e){}
  try{ if(peer) peer.destroy(); }catch(e){}
  peer = null; conn = null; conns = [];
}
function enviarRede(msg, exceto=null){
  if(mode==='host'){ for(const c of conns) if(c!==exceto && c.open) c.send(msg); }
  else if(mode==='guest' && conn && conn.open) conn.send(msg);
}
function sincronizar(exceto=null){
  if(mode==='host') enviarRede({t:'state', state}, exceto);
  else if(mode==='guest') enviarRede({t:'state', state});
  render();
}
function criarSala(){
  if(!temPeerJS()) return;
  fecharRede();
  const codigo = gerarCodigo();
  statusLobby('Criando sala...');
  peer = new Peer('ageguthology-'+codigo, {debug:0});
  peer.on('open', ()=>{
    mode = 'host'; myIndex = 0;
    statusLobby('Sala criada. Envie este codigo:<span class="codigo">'+codigo+'</span>Aguardando Jogador 2...');
  });
  peer.on('connection', c=>{
    if(state || conns.length>=1){ c.on('open', ()=>c.close()); return; }
    conns = [c];
    c.on('data', msg=>receberDoConvidado(c,msg));
    c.on('close', ()=>desconectado('Jogador 2 desconectou.'));
  });
  peer.on('error', e=>statusLobby('Erro ao criar sala: '+e.type+'.'));
}
function receberDoConvidado(c,msg){
  if(!msg || typeof msg!=='object') return;
  if(msg.t==='hello' && !state){
    state = criarEstado(
      $('#p1Mythic').value, msg.mythic || 'athena',
      cleanNick($('#p1Name').value,'Jogador 1'), cleanNick(msg.name,'Jogador 2'),
      true
    );
    log('Partida online iniciada. Dois Locais em disputa ate o turno '+TURNO_RESOLVE+'.');
    iniciarTurno(1);
    c.send({t:'init', state, index:1});
    statusLobby('');
    render();
  }else if(msg.t==='state' && state){
    state = msg.state;
    pendingPlay = null; pendingMoveUid = null;
    sincronizar(c);
  }
}
function entrarSala(){
  if(!temPeerJS()) return;
  fecharRede();
  const codigo = ($('#inpCodigo').value||'').trim().toUpperCase();
  if(codigo.length!==5){ statusLobby('Digite o codigo de 5 caracteres.'); return; }
  statusLobby('Conectando...');
  peer = new Peer({debug:0});
  peer.on('open', ()=>{
    conn = peer.connect('ageguthology-'+codigo, {reliable:true});
    conn.on('open', ()=>{
      mode = 'guest'; myIndex = 1;
      conn.send({t:'hello', mythic:$('#p2Mythic').value, name:cleanNick($('#p2Name').value,'Jogador 2')});
      statusLobby('Conectado. Aguardando o host...');
    });
    conn.on('data', receberDoHost);
    conn.on('close', ()=>desconectado('Conexao perdida com o host.'));
  });
  peer.on('error', e=>{
    if(e.type==='peer-unavailable') statusLobby('Sala nao encontrada. Confira o codigo.');
    else statusLobby('Erro de conexao: '+e.type+'.');
  });
}
function receberDoHost(msg){
  if(!msg || typeof msg!=='object') return;
  if(msg.t==='init'){ state = msg.state; myIndex = msg.index; mode = 'guest'; render(); }
  else if(msg.t==='state'){ state = msg.state; pendingPlay = null; pendingMoveUid = null; render(); }
}
function desconectado(msg){
  if(!state){ statusLobby(msg); return; }
  log(msg+' Continue localmente ou comece um novo teste.');
  mode = 'local'; myIndex = null;
  render();
}
function resetar(){
  fecharRede();
  state = null; mode = 'local'; myIndex = null; lobbyStatus = '';
  pendingPlay = null; pendingMoveUid = null;
  render();
}

/* ==================== RENDER ==================== */
function render(){
  if(!state){ renderSetup(); return; }
  const bottom = online() ? myIndex : 0;
  const top = 1-bottom;
  const placar = placarLocais();
  $('#app') && ($('#app').innerHTML =
    '<div class="table">'+
      '<div class="topbar">'+
        '<div class="brand">AGE OF GUTHOLOGY</div>'+
        '<span class="pill">Turno <b>'+state.turno+'/'+TURNO_FINAL+'</b></span>'+
        '<span class="pill gold">Joga agora <b>'+state.players[state.ativo].nome+'</b></span>'+
        '<span class="pill">Placar <b>'+state.players[0].nome+' '+placar[0]+' x '+placar[1]+' '+state.players[1].nome+'</b></span>'+
        '<div class="grow"></div><button onclick="resetar()">Novo teste</button>'+
      '</div>'+
      renderStrip(top, false)+
      renderHand(top, false)+
      '<div class="board">'+
        renderSlot(0,'L',top,bottom)+
        renderCentro(top,bottom)+
        renderSlot(1,'R',top,bottom)+
      '</div>'+
      renderHand(bottom, true)+
      renderStrip(bottom, true)+
      '<details class="logwrap" open><summary>Log de regras</summary><div class="log">'+
        state.log.map(x=>'<div>'+x+'</div>').join('')+
      '</div></details>'+
    '</div>'+
    renderOverlay());
}

function renderCentro(top,bottom){
  if(state.locais[2]) return renderSlot(2,'C',top,bottom);
  const placar = placarLocais();
  return '<div class="slot slot-C"><div class="statuscard">'+
    '<b>Turno '+state.turno+' de '+TURNO_FINAL+'</b><br>'+
    state.players[state.ordem].nome+' comeca este turno<br>'+
    'Locais resolvem no fim do turno <b>'+TURNO_RESOLVE+'</b><br>'+
    'Depois, o <b>Estagio Final</b> surge aqui (turnos 4-'+TURNO_FINAL+')'+
    '<div class="turn-order">Mana nao gasta acumula para o proximo turno</div>'+
  '</div></div>';
}

function renderStrip(pi, isBottom){
  const p = state.players[pi], m = MYTHICS[p.mythic];
  const acting = state.ativo===pi && !state.gameOver;
  const podeAgir = canAct(pi);
  let acoes = '';
  if(isBottom || mode==='local'){
    acoes = '<div class="god-actions">'+
      '<button title="'+m.ativo+'" onclick="usarAtivo('+pi+')" '+((p.activeUsed||!podeAgir)?'disabled':'')+'>Ativo'+(m.custoAtivo?' ('+m.custoAtivo+'⬡)':'')+'</button>'+
      '<button onclick="encerrarJogadas('+pi+')" '+(!podeAgir?'disabled':'')+'>Encerrar jogadas</button>'+
    '</div>';
  }
  return '<div class="pstrip'+(acting?' acting':'')+'">'+
    '<div class="avatar" style="background-image:url('+m.img+')"></div>'+
    '<div><div class="pname">'+p.nome+'</div><div class="god" title="Passiva: '+m.passiva+'">'+m.nome+'</div></div>'+
    '<span class="stat mana">⬡ Mana '+p.mana+'</span>'+
    '<span class="stat">Deck '+p.deck.length+'</span>'+
    '<span class="stat">Mao '+p.mao.length+'</span>'+
    (p.moveCredit>0?'<span class="stat win">Movimento de Atena pronto</span>':'')+
    acoes+
  '</div>';
}

function verMao(pi){
  if(state.gameOver) return true;
  if(online()) return pi===myIndex;
  if(!state.hideHands) return true;
  return pi===state.ativo && !state.passPending;
}

function renderHand(pi, isBottom){
  const p = state.players[pi];
  if(!verMao(pi)){
    const dorsos = Array(Math.min(p.mao.length,9)).fill('<div class="cardback"></div>').join('');
    return '<div class="hand-row oculta">'+dorsos+'<span class="hidden-note">Mao de '+p.nome+': '+p.mao.length+' carta(s)</span></div>';
  }
  const podeAgir = canAct(pi);
  const cards = p.mao.map((id,idx)=>{
    const c = CARDS[id];
    const custo = custoCarta(pi,id);
    const paga = p.mana>=custo;
    const cls = ['hcard', c.tipo==='unit'?'unit':'spell'];
    if(!podeAgir || !paga) cls.push('dead');
    if(pendingPlay===idx && state.ativo===pi) cls.push('selected');
    return '<div class="'+cls.join(' ')+'" onclick="selecionarCarta('+pi+','+idx+')">'+
      '<div class="cost">'+custo+'</div>'+
      '<h4>'+c.nome+'</h4>'+
      (c.tipo==='unit' ? '<div class="pow">'+c.poder+' <span>PODER</span></div>' : '<div class="pow">✦ <span>MAGIA</span></div>')+
      '<div class="fx">'+(c.texto||'')+'</div>'+
    '</div>';
  }).join('');
  return '<div class="hand-row">'+(cards||'<span class="hidden-note">Sem cartas na mao.</span>')+'</div>';
}

function renderSlot(slot, area, top, bottom){
  const lid = state.locais[slot];
  const l = LOCATIONS[lid];
  const res = state.resolvidos[slot];
  const aberto = slotAberto(slot);
  // clicavel para baixar carta ou mover unidade
  let clicavel = false;
  if(aberto && !state.gameOver){
    const pi = state.ativo;
    if(pendingPlay!==null && canAct(pi)){
      clicavel = state.players[pi].unidades.filter(u=>u.loc===slot).length < CAP_LOCAL;
    }else if(pendingMoveUid!==null && canAct(pi)){
      const u = state.players[pi].unidades.find(x=>x.uid===pendingMoveUid);
      clicavel = !!u && u.loc!==slot && state.players[pi].unidades.filter(x=>x.loc===slot).length < CAP_LOCAL;
    }
  }
  const pwTop = somaPoder(top,slot), pwBot = somaPoder(bottom,slot);
  const lane = pi => {
    const units = state.players[pi].unidades.filter(u=>u.loc===slot);
    return '<div class="lane"><div class="lane-head"><span>'+state.players[pi].nome+'</span><span class="lane-pow">'+somaPoder(pi,slot)+' ⚔</span></div>'+
      (units.map(u=>{
        const p = state.players[pi];
        const movable = canAct(pi) && p.moveCredit>0 && aberto;
        const selMove = pendingMoveUid===u.uid;
        const c = CARDS[u.id];
        return '<div class="uchip'+(movable?' movable':'')+(selMove?' selected-move':'')+'"'+(movable?' onclick="clicarUnidade('+pi+','+u.uid+')"':'')+'>'+
          '<span class="upow">'+poderUnidade(u,pi)+'</span>'+
          '<span class="uname">'+u.nome+(u.tempP?' <small>('+(u.tempP>0?'+':'')+u.tempP+')</small>':'')+'</span>'+
          (c.texto?'<span class="ufx">✦</span>':'')+
        '</div>';
      }).join('') || '<div class="lane-empty">— vazio —</div>')+
    '</div>';
  };
  let banner = '';
  if(res){
    banner = res.vencedor>=0
      ? '<div class="win-banner">🏆 '+state.players[res.vencedor].nome+' ('+res.poder[0]+' x '+res.poder[1]+')</div>'
      : '<div class="win-banner">Empate ('+res.poder[0]+' x '+res.poder[1]+')</div>';
  }
  return '<div class="slot slot-'+area+(res?' resolved-slot':'')+'">'+
    lane(top)+
    '<div class="loccard'+(clicavel?' placeable':'')+(res?' resolved':'')+'"'+(clicavel?' onclick="clicarSlot('+slot+')"':'')+'>'+
      '<div class="licon">'+l.icon+'</div>'+
      '<div class="lname">'+(slot===2?'⚡ ESTAGIO FINAL: ':'')+l.nome+'</div>'+
      '<div class="lfx">'+l.fx+'</div>'+
      '<div class="lscore">'+pwTop+' × '+pwBot+'</div>'+
      (clicavel?'<div class="win-banner">Clique para colocar aqui</div>':'')+
      banner+
    '</div>'+
    lane(bottom)+
  '</div>';
}

function renderOverlay(){
  if(state.gameOver){
    const placar = placarLocais();
    return '<div class="overlay"><div class="overlay-card">'+
      '<h2>Fim de jogo</h2><p>'+state.gameOver+'</p>'+
      '<p>Placar de Locais: '+state.players[0].nome+' '+placar[0]+' × '+placar[1]+' '+state.players[1].nome+'</p>'+
      '<button onclick="resetar()">Novo teste</button>'+
    '</div></div>';
  }
  if(state.passPending){
    return '<div class="overlay"><div class="overlay-card">'+
      '<h2>Passe o dispositivo 📱</h2><p>Agora e a vez de <b>'+state.players[state.ativo].nome+'</b>.</p>'+
      '<button onclick="confirmarPasse()">Sou eu, continuar</button>'+
    '</div></div>';
  }
  return '';
}

function renderSetup(){
  $('#app').innerHTML =
    '<div class="setup">'+
      '<h1>Age of Guthology</h1>'+
      '<p>Poder x Custo x Efeito. Sem combate direto: quem tiver mais Poder no Local, leva o Local.</p>'+
      '<div class="setup-grid">'+
        '<div class="setup-card"><h2>Jogadores</h2>'+
          mythSelect('Jogador 1','p1Mythic','thor')+
          mythSelect('Jogador 2','p2Mythic','athena')+
          '<label style="color:#cbd8e5;font-size:13px">Esconder maos no modo local (passar o dispositivo)?<br>'+
          '<select id="hideHands"><option value="nao">Nao, modo bancada (ve tudo)</option><option value="sim">Sim, maos privadas</option></select></label>'+
          '<div class="phase-controls"><button onclick="iniciarJogo()">Iniciar partida local</button></div>'+
        '</div>'+
        '<div class="setup-card"><h2>Online por codigo</h2>'+
          '<p class="small-note">Quem cria a sala e o <b>Jogador 1</b>. Quem entra pelo codigo e o <b>Jogador 2</b>. Cada um ve so a propria mao.</p>'+
          '<div class="phase-controls"><button onclick="criarSala()">Criar sala online</button></div>'+
          '<div class="online-row"><input id="inpCodigo" maxlength="5" placeholder="CODIGO" oninput="this.value=this.value.toUpperCase()"><button onclick="entrarSala()">Entrar</button></div>'+
          '<div id="statusLobby">'+lobbyStatus+'</div>'+
        '</div>'+
        '<div class="rules-card"><h2>Regras desta versao</h2><ul>'+
          '<li><b>2 Locais</b> em disputa nos turnos 1 a '+TURNO_RESOLVE+'. No fim do turno '+TURNO_RESOLVE+', cada Local vai para quem tiver mais Poder nele.</li>'+
          '<li>Se ninguem levar os 2, surge o <b>Estagio Final</b>: um unico Local, turnos 4 a '+TURNO_FINAL+', decks no talo.</li>'+
          '<li><b>Mana:</b> turno N da +N de mana. O que sobrar <b>acumula</b>.</li>'+
          '<li><b>Ordem:</b> turnos impares o J1 joga primeiro; pares, o J2. Cada um joga tudo e confirma.</li>'+
          '<li>Cartas nao morrem: sao Poder investido. Efeitos e Locais mudam a conta.</li>'+
          '<li>Vence quem levar <b>2 Locais</b>. Empate? Desempata o Poder total.</li>'+
        '</ul><div class="small-note">Bancada de testes — balance em andamento. 2v2 no futuro.</div></div>'+
      '</div>'+
    '</div>';
}

function mythSelect(label,id,chosen){
  const nameId = id==='p1Mythic' ? 'p1Name' : 'p2Name';
  return `<div class="myth-row">
    <div class="myth-portrait" id="${id}Img" style="background-image:url(${MYTHICS[chosen].img})"></div>
    <div class="myth-fields">
      <label>${label}<input id="${nameId}" maxlength="18" placeholder="Nick" value="${label}"></label>
      <label>Deus<select id="${id}" onchange="atualizarRetratoSetup('${id}')">
        ${Object.entries(MYTHICS).map(([k,m])=>`<option value="${k}" ${k===chosen?'selected':''}>${m.nome}</option>`).join('')}
      </select></label>
    </div>
  </div>`;
}

function atualizarRetratoSetup(id){
  const sel = document.getElementById(id);
  const img = document.getElementById(id+'Img');
  if(sel && img) img.style.backgroundImage = 'url('+MYTHICS[sel.value].img+')';
}

render();
</script>
</body>
</html>
